{% extends 'shared/layout/base.html' %}

{% block title %}Workflow Not Found - Build.One{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/agent.css') }}?v={{ range(1000, 9999) | random }}">
{% endblock %}

{% block content %}

<div class="agent-not-found">
    <div class="agent-not-found-icon">🔍</div>
    <h1>Workflow Not Found</h1>
    <p>The workflow with ID <code>{{ public_id }}</code> could not be found.</p>
    <a href="/agent/list" class="btn btn-primary">Back to Inbox</a>
</div>

{% endblock %}
