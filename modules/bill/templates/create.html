<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bill</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            html, body { min-height: 100vh; margin: 0; }
            #drop-area.dragover { background-color: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
            input[type="file"] {
                display: none;
            }
        </style>
    </head>
    <body class="bg-gray-50">
        <div class="relative z-10 max-w-6xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col md:flex-row gap-6" id="form-container">
            <div class="flex-1 space-y-6">
                <form id="invoice-form" class="space-y-6" onsubmit="return false;">
                    <div class="grid grid-cols-2 gap-4">
                        <select name="vendor" id="vendor" class="border p-2 rounded w-full" required>
                            <option value="">Select Vendor</option>
                            {% if vendors %}
                                {% for vendor in vendors %}
                                    <option value="{{ vendor.guid }}">{{ vendor.name }}</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                        <input name="number" placeholder="Invoice Number" class="border p-2 rounded w-full">
                        <input type="date" name="date" class="border p-2 rounded w-full">
                        <input name="total_amount" placeholder="Total Amount" type="text" inputmode="decimal" readonly class="border p-2 rounded w-full">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <p class="font-semibold">Line Items</p>
                            <button type="button" onclick="addLineItem()" class="text-blue-600 text-sm">+ Add Item</button>
                        </div>
                        <div id="line-items" class="space-y-2">
                            <!-- Bill Line Item -->
                        </div>
                    </div>

                    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Submit Invoice</button>

                    <div id="preview" class="mb-6">
                        <iframe id="pdf-viewer" class="w-full aspect-[8.5/11] border rounded mt-2 hidden" type="application/pdf"></iframe>
                    </div>

                </form>
            </div>
        </div>

        <script>
            const formContainer = document.getElementById('form-container');
            const fileNameEl = document.getElementById('file-name');
            const pdfViewer = document.getElementById('pdf-viewer');

            function toBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = (error) => reject(error);
                });
            }

            function clearFile() {
                fileNameEl.textContent = '';
                pdfViewer.src = '';
                document.getElementById('preview').classList.add('hidden');
            }

            function handleFile(file) {
                if (file && file.type === 'application/pdf') {
                    // Store the file in the file input
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    fileInput.files = dataTransfer.files;
                    
                    // Update the UI
                    fileNameEl.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600 cursor-pointer" data-file-input="${fileInput.id}">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.125 2.25h-4.5c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-9M10.125 2.25h.375a9 9 0 0 1 9 9v.375M10.125 2.25A3.375 3.375 0 0 1 13.5 5.625v1.5c0 .621.504 1.125 1.125 1.125h1.5a3.375 3.375 0 0 1 3.375 3.375M9 15l2.25 2.25L15 12" />
                        </svg>
                    `;
                    dropArea.classList.add('hidden');
                    preview.classList.remove('hidden');
                    
                    // Show PDF in the viewer
                    const url = URL.createObjectURL(file);
                    pdfViewer.src = url;
                    pdfViewer.classList.remove('hidden');
                }
            }

            function previewPDF(element, fileInput) {
                const file = fileInput.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    const pdfViewer = document.getElementById('pdf-viewer');
                    pdfViewer.src = url;
                    pdfViewer.classList.remove('hidden');
                }
            }

            function addLineItem() {
                const container = document.createElement('div');
                container.className = 'grid grid-cols-12 gap-2';
                const fileInputId = `file-input-${Date.now()}`;
                container.innerHTML = `
                    <select name="cost_code[]" class="border p-2 rounded col-span-2" required>
                        <option value="">Select Cost Code</option>
                        {% if sub_cost_codes %}
                            {% for sub_cost_code in sub_cost_codes %}
                                <option value="{{ sub_cost_code.guid }}">{{ sub_cost_code.number }} - {{ sub_cost_code.name }}</option>
                            {% endfor %}
                        {% endif %}
                    </select>
                    <input name="description[]" placeholder="Description" class="border p-2 rounded col-span-3">
                    <input name="line_amount[]" placeholder="Amount" value="$0.00" class="border p-2 rounded col-span-2">
                    <label class="flex flex-col items-center col-span-1 text-sm">
                        <span class="mb-1">Billable</span>
                        <input type="checkbox" name="billable[]" checked class="mt-1">
                    </label>
                    <select name="project[]" class="border p-2 rounded col-span-2" required>
                        <option value="">Select Project</option>
                        {% if projects %}
                            {% for project in projects %}
                                <option value="{{ project.guid }}">{{ project.name }}</option>
                            {% endfor %}
                        {% endif %}
                    </select>
                    <div class="col-span-2">
                        <div class="drop-area border-2 border-dashed border-gray-300 p-2 rounded text-center text-sm text-gray-500">
                            <p class="text-xs">Drag & drop PDF or click here</p>
                            <input type="file" class="hidden" accept="application/pdf" id="${fileInputId}" data-line-item-file>
                        </div>
                        <div class="preview hidden mt-2 flex flex-col items-center">
                            <p class="text-xs text-gray-700">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600 cursor-pointer" data-file-input="${fileInputId}">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.125 2.25h-4.5c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-9M10.125 2.25h.375a9 9 0 0 1 9 9v.375M10.125 2.25A3.375 3.375 0 0 1 13.5 5.625v1.5c0 .621.504 1.125 1.125 1.125h1.5a3.375 3.375 0 0 1 3.375 3.375M9 15l2.25 2.25L15 12" />
                                </svg>
                            </p>
                            <button type="button" class="text-red-600 text-xs underline">Remove</button>
                        </div>
                    </div>
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-600 text-xs underline col-span-12">Remove Line Item</button>
                `;
                document.getElementById('line-items').appendChild(container);
                formatCurrency(container.querySelector('input[name="line_amount[]"]'));
                initializeFileUpload(container);
            }

            function initializeFileUpload(container) {
                const dropArea = container.querySelector('.drop-area');
                const fileInput = container.querySelector('input[type="file"]');
                const preview = container.querySelector('.preview');
                const fileNameEl = preview.querySelector('p');
                const removeBtn = preview.querySelector('button');
                const pdfViewer = document.getElementById('pdf-viewer');

                function handleFile(file) {
                    if (file && file.type === 'application/pdf') {
                        // Store the file in the file input
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;
                        
                        // Update the UI
                        fileNameEl.innerHTML = `
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-600 cursor-pointer" data-file-input="${fileInput.id}">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10.125 2.25h-4.5c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125v-9M10.125 2.25h.375a9 9 0 0 1 9 9v.375M10.125 2.25A3.375 3.375 0 0 1 13.5 5.625v1.5c0 .621.504 1.125 1.125 1.125h1.5a3.375 3.375 0 0 1 3.375 3.375M9 15l2.25 2.25L15 12" />
                            </svg>
                        `;
                        dropArea.classList.add('hidden');
                        preview.classList.remove('hidden');
                        
                        // Show PDF in the viewer
                        const url = URL.createObjectURL(file);
                        pdfViewer.src = url;
                        pdfViewer.classList.remove('hidden');
                    }
                }

                function clearFile() {
                    fileInput.value = '';
                    fileNameEl.textContent = '';
                    dropArea.classList.remove('hidden');
                    preview.classList.add('hidden');
                    
                    // Clear PDF viewer
                    pdfViewer.src = '';
                    pdfViewer.classList.add('hidden');
                }

                ['dragenter', 'dragover'].forEach(event => {
                    dropArea.addEventListener(event, e => {
                        e.preventDefault();
                        dropArea.classList.add('border-blue-500', 'bg-blue-50');
                    });
                });

                ['dragleave', 'drop'].forEach(event => {
                    dropArea.addEventListener(event, e => {
                        e.preventDefault();
                        dropArea.classList.remove('border-blue-500', 'bg-blue-50');
                    });
                });

                dropArea.addEventListener('click', () => fileInput.click());
                dropArea.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));
                fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
                removeBtn.addEventListener('click', clearFile);

                // Add cursor pointer to indicate clickability
                dropArea.style.cursor = 'pointer';
            }

            function formatCurrency(input) {
                // Remove any non-numeric characters except decimal point
                const cleaned = input.value.replace(/[^0-9.-]/g, '');
                const value = parseFloat(cleaned);
                if (!isNaN(value)) {
                    input.value = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD',
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    }).format(value);
                } else {
                    input.value = '$0.00';
                }
            }

            function updateTotalAmount() {
                const amountInputs = document.querySelectorAll('input[name="line_amount[]"]');
                let total = 0;
                amountInputs.forEach(input => {
                    const cleaned = input.value.replace(/[^0-9.-]/g, '');
                    const value = parseFloat(cleaned);
                    if (!isNaN(value)) total += value;
                });
                document.querySelector('input[name="total_amount"]').value = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(total);
            }

            // Handle input changes
            document.addEventListener('input', function (e) {
                if (e.target && e.target.name === 'line_amount[]') {
                    updateTotalAmount();
                }
            });

            // Handle focus (when clicking into the field)
            document.addEventListener('focus', function (e) {
                if (e.target && e.target.name === 'line_amount[]') {
                    // Remove currency formatting but keep the number
                    const cleaned = e.target.value.replace(/[^0-9.-]/g, '');
                    e.target.value = cleaned;
                }
            });

            // Handle blur (when leaving the field)
            document.addEventListener('blur', function (e) {
                if (e.target && e.target.name === 'line_amount[]') {
                    formatCurrency(e.target);
                    updateTotalAmount();
                }
            });

            document.addEventListener('click', function (e) {
                if (e.target && e.target.tagName === 'BUTTON' && e.target.textContent === 'Remove Line Item') {
                    setTimeout(updateTotalAmount, 0);
                }
            });

            async function submitForm() {
                const form = document.getElementById('invoice-form');
                const formData = new FormData(form);

                // Convert FormData to JSON
                const jsonData = {
                    vendor: formData.get('vendor'),
                    number: formData.get('number'),
                    date: formData.get('date'),
                    line_items: []
                };

                // Get all line items
                const lineItems = document.querySelectorAll('#line-items > div');
                for (const item of lineItems) {
                    const lineItem = {
                        'sub-cost-code': item.querySelector('[name="cost_code[]"]').value,
                        'description': item.querySelector('[name="description[]"]').value,
                        'amount': parseFloat(item.querySelector('[name="line_amount[]"]').value.replace(/[^0-9.-]+/g, '')),
                        'units': 1,
                        'rate': parseFloat(item.querySelector('[name="line_amount[]"]').value.replace(/[^0-9.-]+/g, '')),
                        'is-billable': item.querySelector('[name="billable[]"]').checked,
                        'project': item.querySelector('[name="project[]"]').value
                    };

                    // Add file data if this line item has a file
                    const fileInput = item.querySelector('input[type="file"]');
                    console.log('Line item container:', item);
                    console.log('File input found:', fileInput);
                    console.log('File input files:', fileInput?.files);
                    if (fileInput?.files.length > 0) {
                        const file = fileInput.files[0];
                        console.log('Processing file:', file.name);
                        try {
                            const base64Content = await toBase64(file);
                            console.log('Base64 content length:', base64Content.length);
                            lineItem.attachment = {
                                name: file.name,
                                type: file.type,
                                size: file.size,
                                content: base64Content
                            };
                            console.log('Attachment added to line item');
                        } catch (error) {
                            console.error('Error converting file to base64:', error);
                        }
                    }

                    jsonData.line_items.push(lineItem);
                }

                console.log('Final JSON data:', jsonData);
                try {
                    const response = await fetch('/api/bill/post', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    });
                    console.log(response);
                    let result;
                    try {
                        result = await response.json();
                    } catch (e) {
                        console.error('Failed to parse JSON response:', e);
                        throw new Error(`Server returned invalid JSON. Status: ${response.status}`);
                    }

                    if (!response.ok) {
                        throw new Error(`Server error: ${result.message || response.statusText}`);
                    }
                    
                    if (result.success) {
                        alert('Bill submitted successfully!');
                        location.reload();
                    } else {
                        alert(`Error: ${result.message || 'Unknown error occurred'}`);
                    }
                } catch (error) {
                    console.error('Error details:', error);
                    alert(`Error submitting form: ${error.message}`);
                }
            }

            // Add event listener to form submit button
            document.querySelector('button[type="submit"]').addEventListener('click', submitForm);

            // Initialize the form with one line item
            console.log('Initializing form...');
            try {
                addLineItem();
                console.log('Line item added successfully');
            } catch (error) {
                console.error('Error adding line item:', error);
            }

        </script>

    </body>

</html>
