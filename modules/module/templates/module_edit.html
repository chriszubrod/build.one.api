<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Module</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="relative z-10 max-w-3xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col gap-6" id="form-container">
        <div class="absolute right-8 top-8">
            <button onclick="window.location.href='/modules'" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-md">
                Back to Module List
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4">Edit Module</h1>
        {% if module %}
        <form id="module-edit-form" class="space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block font-semibold mb-1">GUID</label>
                    <input value="{{ module.guid }}" class="border p-2 rounded w-full bg-gray-100" readonly>
                </div>
                <div>
                    <label for="name" class="block font-semibold mb-1">Module Name</label>
                    <input type="text" id="name" name="name" class="border p-2 rounded w-full" required value="{{ module.name }}">
                </div>
                <div>
                    <label for="description" class="block font-semibold mb-1">Description</label>
                    <input type="text" id="description" name="description" class="border p-2 rounded w-full" required value="{{ module.description }}">
                </div>
                <div>
                    <label for="slug" class="block font-semibold mb-1">Slug</label>
                    <input type="text" id="slug" name="slug" class="border p-2 rounded w-full" required value="{{ module.slug }}">
                </div>
            </div>
            <button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Update Module</button>
        </form>
        <script>
            const form = document.getElementById('module-edit-form');
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const formData = new FormData(form);
                    const jsonData = {
                        guid: "{{ module.guid }}",
                        name: formData.get('name'),
                        description: formData.get('description'),
                        slug: formData.get('slug')
                    };
                    try {
                        const response = await fetch('/api/patch/module', {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(jsonData)
                        });
                        const result = await response.json();
                        if (response.ok && result.success) {
                            alert('Module updated successfully!');
                            window.location.href = '/modules';
                        } else {
                            alert('Error: ' + (result.message || 'Unknown error'));
                        }
                    } catch (error) {
                        alert('Error updating module: ' + error.message);
                    }
                });
            }
        </script>
        {% else %}
        <div class="text-red-600 font-semibold">Module not found.</div>
        {% endif %}
    </div>
</body>
</html>
