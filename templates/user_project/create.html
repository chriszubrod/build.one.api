<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User Project - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-plus-circle me-2"></i>Create User Project
                    </h1>
                    <a href="/user_project/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-id-card me-2"></i>User Project Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createUserProjectForm">
                                <div class="mb-3">
                                    <label for="user_id" class="form-label">
                                        User <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="user_id" name="user_id" required>
                                        <option value="">Select User</option>
                                        {% for user in users %}
                                        <option value="{{ user.id }}">{{ user.firstname }} {% if user.lastname %}{{ user.lastname }}{% endif %}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="project_id" class="form-label">
                                        Project <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="project_id" name="project_id" required>
                                        <option value="">Select Project</option>
                                        {% for project in projects %}
                                        <option value="{{ project.id }}">{{ project.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/user_project/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Create User Project
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createUserProjectForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const payload = {
                user_id: formData.get('user_id'),
                project_id: formData.get('project_id')
            };

            try {
                const response = await fetch('/api/v1/create/user_project', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/user_project/list';
                } else {
                    const error = await response.json();
                    alert('Error creating user project: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating user project: ' + error.message);
            }
        });
    </script>
</body>
</html>
