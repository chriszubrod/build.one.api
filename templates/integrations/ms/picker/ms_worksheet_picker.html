<div class="space-y-2">
  {% if worksheets and worksheets|length > 0 %}
    {% for w in worksheets %}
      <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
        <div class="flex justify-between items-center">
          <span class="text-sm text-gray-700">{{ w.name }}</span>
          <button class="text-green-600 text-sm hover:text-green-800"
                  data-ms-id="{{ w.ms_id }}"
                  onclick="selectWorksheetFromButton(this); return false;">
            Select Worksheet
          </button>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p class="text-gray-600">No worksheets found.</p>
  {% endif %}
</div>
