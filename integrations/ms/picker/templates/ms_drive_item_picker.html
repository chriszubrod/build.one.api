{% if ms_drives_items %}
    <div class="grid grid-cols-2 gap-4">
        {% for drive_item in ms_drives_items %}
            <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
                <div class="flex items-center">
                    <!-- Drive Name -->
                    <div class="flex-1">
                        <a href="{{ url_for('web_ms_picker.drive_item_children_picker_route', drive_id=drive_id, drive_item_id=drive_item.drive_item_id) }}" class="text-blue-600 hover:text-blue-800">
                            {{ drive_item.name }}
                        </a>
                    </div>

                    <!-- Drive Type -->
                    <div class="text-sm text-gray-500 ml-4">
                        {{ drive_item.drive_item_type }}
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-gray-600">No drives found.</p>
{% endif %}
