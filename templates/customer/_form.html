<label for="customername">Customer Name:</label>
{% if readonly %}
    <span class="readonly-field">{{ customer.customername }}</span>
{% else %}
    <input type="text" id="customername" name="customername" value="{{ customer.customername if customer else '' }}" required>
{% endif %}

<label for="isActive">Active:</label>
{% if readonly %}
    <span class="readonly-field">{{ customer.isActive }}</span>
{% else %}
    <input type="checkbox" id="isActive" name="isActive" value="1" checked>
{% endif %}
