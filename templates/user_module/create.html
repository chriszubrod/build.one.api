{% extends 'shared/layout/base.html' %}

{% block title %}Create User Module - Build.One{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/user_module.css') }}?v={{ range(1000, 9999) | random }}">
{% endblock %}

{% block content %}

    <div class="user-module-page-header">
        <h1>Create User Module</h1>
        <a href="/user_module/list" class="btn btn-secondary">Back to List</a>
    </div>

    <div class="user-module-form-container">
        <div class="user-module-form-card">
            <div class="user-module-form-card-header">
                <h5>User Module Details</h5>
            </div>
            <div class="user-module-form-card-body">
                <form id="createUserModuleForm">
                    <div class="user-module-form-group">
                        <label for="user_id" class="user-module-form-label">
                            User <span class="required">*</span>
                        </label>
                        <select class="user-module-form-control"
                                id="user_id"
                                name="user_id"
                                required>
                            <option value="">Select User</option>
                            {% for user in users %}
                            <option value="{{ user.id }}">{{ user.firstname }} {% if user.lastname %}{{ user.lastname }}{% endif %}</option>
                            {% endfor %}
                        </select>
                        <div class="user-module-form-text">Required field.</div>
                    </div>

                    <div class="user-module-form-group">
                        <label for="module_id" class="user-module-form-label">
                            Module <span class="required">*</span>
                        </label>
                        <select class="user-module-form-control"
                                id="module_id"
                                name="module_id"
                                required>
                            <option value="">Select Module</option>
                            {% for module in modules %}
                            <option value="{{ module.id }}">{{ module.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="user-module-form-text">Required field.</div>
                    </div>

                    <div class="user-module-form-actions">
                        <div class="user-module-form-actions-left"></div>
                        <div class="user-module-form-actions-right">
                            <a href="/user_module/list" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Create User Module</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

{% endblock %}

{% block scripts %}
    <script>
        document.getElementById('createUserModuleForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const payload = {
                user_id: parseInt(formData.get('user_id')),
                module_id: parseInt(formData.get('module_id'))
            };

            try {
                const response = await fetch('/api/v1/create/user_module', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/user_module/list';
                } else {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        alert('Error creating user module: ' + (error.detail || error.message || 'Unknown error'));
                    } else {
                        const errorText = await response.text();
                        alert('Error creating user module: ' + errorText);
                    }
                }
            } catch (error) {
                alert('Error creating user module: ' + error.message);
            }
        });
    </script>
{% endblock %}
