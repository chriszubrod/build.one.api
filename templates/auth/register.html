<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto mt-16 p-8 bg-white rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-center">Register</h1>
        <div id="registerError" class="hidden mb-4 p-3 rounded bg-red-100 text-red-700 text-center"></div>
        <form id="registerForm" class="space-y-6" autocomplete="off" onsubmit="return false;">
            <div>
                <label for="username" class="block font-semibold mb-1">Username</label>
                <input type="text" id="username" name="username" class="border p-2 rounded w-full" autocomplete="off" required>
            </div>
            <div>
                <label for="password" class="block font-semibold mb-1">Password</label>
                <input type="password" id="password" name="password" class="border p-2 rounded w-full" autocomplete="off" required>
            </div>
            <div>
                <label for="confirmPassword" class="block font-semibold mb-1">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="border p-2 rounded w-full" autocomplete="off" required>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Register</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-600">
            Already have an account? <a href="{{ url_for('web_auth.login_route') }}" class="text-blue-600 hover:underline">Login here</a>
        </p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            registerForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errorDiv = document.getElementById('registerError');
                if (password !== confirmPassword) {
                    errorDiv.textContent = 'Passwords do not match.';
                    errorDiv.style.display = 'block';
                    return;
                }
                fetch('/api/post/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirmPassword: confirmPassword
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = "{{ url_for('web_auth.login_route') }}";
                    } else {
                        errorDiv.textContent = data.message || 'Registration failed';
                        errorDiv.style.display = 'block';
                    }
                })
                .catch(error => {
                    errorDiv.textContent = 'An error occurred during registration';
                    errorDiv.style.display = 'block';
                });
            });
        });
    </script>
</body>
</html>
