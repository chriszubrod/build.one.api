<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Build.One</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}?v={{ range(1000, 9999) | random }}">
</head>
<body>
    <div class="page-container">
        <section class="auth-logo">
            <div>
                <span aria-hidden="true">b1</span>
                <span>Build.One</span>
            </div>
            <div>
                <span>For Contractors</span>
            </div>
        </section>

        <section class="auth-panel">
            <header>
                <div>
                    {% if current_user %}
                        <span>Signed in as {{ current_user.username }}</span>
                        <a href="/auth/logout">Log out</a>
                    {% else %}
                        <a  href="/auth/signup">Sign up</a>
                    {% endif %}
                </div>
            </header>

            <main aria-labelledby="login-title">
                <div>
                    <h1 id="login-title">Welcome back</h1>
                    <p>Log in to manage your Build.One workspace and keep projects moving.</p>
                </div>

                <form id="loginForm" novalidate>
                    <div>
                        <label for="username">Username</label>
                        <input type="text"
                               id="username"
                               name="username"
                               placeholder="you@example.com"
                               maxlength="50"
                               required>
                    </div>

                    <div>
                        <label for="password">Password</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               maxlength="255"
                               required>
                    </div>
 
                    <button type="submit" id="loginSubmit" disabled>
                        Continue
                    </button>
                </form>
            </main>

            <footer>
                <!--<a href="/support">Support</a>-->
                <!--<a href="/privacy">Privacy</a>-->
                <!--<a href="/terms">Terms</a>-->
            </footer>
        </section>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginSubmit = document.getElementById('loginSubmit');
        const toggleLoginButtonState = () => {
            const usernameFilled = loginForm.username.value.trim().length > 0;
            const passwordFilled = loginForm.password.value.trim().length > 0;
            loginSubmit.disabled = !(usernameFilled && passwordFilled);
        };

        loginForm.addEventListener('input', toggleLoginButtonState);
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            toggleLoginButtonState();
            if (loginSubmit.disabled) {
                return;
            }

            const formData = new FormData(this);
            const data = {
                username: formData.get('username'),
                password: formData.get('password'),
            };

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();

                    localStorage.clear();
                    localStorage.setItem('token.access_token', result.token.access_token);
                    localStorage.setItem('token.token_type', result.token.token_type);
                    localStorage.setItem('token.expires_in', result.token.expires_in);
                    localStorage.setItem('token.refresh_token', result.refresh_token.refresh_token);
                    localStorage.setItem('token.refresh_expires_in', result.refresh_token.expires_in);
                    localStorage.setItem('token.stored_at', Math.floor(Date.now() / 1000).toString());
                    localStorage.setItem('auth.username', result.auth.username);
                    localStorage.setItem('auth.public_id', result.auth.public_id);

                    document.cookie = `token.access_token=${result.token.access_token}; path=/; max-age=${result.token.expires_in}; samesite=lax`;

                    window.location.href = '/dashboard';
                } else {
                    let errorMessage = 'Unknown error';
                    try {
                        const error = await response.json();
                        errorMessage = error.detail || 'Unknown error';
                    } catch (jsonError) {
                        // If response is not JSON (e.g., HTML error page), get text
                        const errorText = await response.text();
                        errorMessage = `Server error (${response.status}): ${errorText.substring(0, 100)}`;
                    }
                    alert('Unable to sign in: ' + errorMessage);
                }
            } catch (error) {
                alert('Unable to sign in: ' + error.message);
            }
        });

        toggleLoginButtonState();
    </script>
</body>
</html>
