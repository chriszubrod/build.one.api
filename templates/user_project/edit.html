<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User Project - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel, .btn-delete {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-edit me-2"></i>Edit User Project
                    </h1>
                    <a href="/user_project/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-id-card me-2"></i>User Project Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="editUserProjectForm">
                                <input type="hidden" id="public_id" name="public_id" value="{{ user_project.public_id }}">
                                <input type="hidden" id="row_version" name="row_version" value="{{ user_project.row_version }}">

                                <div class="mb-3">
                                    <label for="user_id" class="form-label">
                                        User <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="user_id" name="user_id" required>
                                        <option value="">Select User</option>
                                        {% for user in users %}
                                        <option value="{{ user.id }}" {% if user.id == user_project.user_id %}selected{% endif %}>{{ user.firstname }} {{ user.lastname }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="project_id" class="form-label">
                                        Project <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="project_id" name="project_id" required>
                                        <option value="">Select Project</option>
                                        {% for project in projects %}
                                        <option value="{{ project.id }}" {% if project.id == user_project.project_id %}selected{% endif %}>{{ project.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <div>
                                        <button type="button" class="btn btn-danger btn-delete" onclick="deleteUserProject()">
                                            <i class="fas fa-trash me-1"></i>Delete
                                        </button>
                                    </div>
                                    <div>
                                        <a href="/user_project/list" class="btn btn-secondary btn-cancel">
                                            <i class="fas fa-times me-1"></i>Cancel
                                        </a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save me-1"></i>Update User Project
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('editUserProjectForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                user_id: formData.get('user_id'),
                project_id: formData.get('project_id'),
                row_version: formData.get('row_version')
            };

            try {
                const response = await fetch(`/api/v1/update/user_project/${formData.get('public_id')}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = '/user_project/list';
                } else {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        let message = 'Unknown error';
                        if (error.detail) {
                            message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                        } else if (error.message) {
                            message = error.message;
                        } else if (typeof error === 'string') {
                            message = error;
                        } else {
                            message = JSON.stringify(error);
                        }
                        alert('Error updating user project: ' + message);
                    } else {
                        const errorText = await response.text();
                        alert('Error updating user project: ' + errorText);
                    }
                }
            } catch (error) {
                alert('Error updating user project: ' + error.message);
            }
        });

        async function deleteUserProject() {
            if (confirm('Are you sure you want to delete this user project? This action cannot be undone.')) {
                const formData = new FormData(document.getElementById('editUserProjectForm'));

                try {
                    const response = await fetch(`/api/v1/delete/user_project/${formData.get('public_id')}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ row_version: formData.get('row_version') })
                    });

                    if (response.ok) {
                        window.location.href = '/user_project/list';
                    } else {
                        const contentType = response.headers.get('content-type');
                        if (contentType && contentType.includes('application/json')) {
                            const error = await response.json();
                            let message = 'Unknown error';
                            if (error.detail) {
                                message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                            } else if (error.message) {
                                message = error.message;
                            } else if (typeof error === 'string') {
                                message = error;
                            } else {
                                message = JSON.stringify(error);
                            }
                            alert('Error deleting user project: ' + message);
                        } else {
                            const errorText = await response.text();
                            alert('Error deleting user project: ' + errorText);
                        }
                    }
                } catch (error) {
                    alert('Error deleting user project: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
