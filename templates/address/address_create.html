<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Address</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="relative z-10 max-w-3xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col gap-6" id="form-container">
        <div class="absolute right-8 top-8">
            <button onclick="window.location.href='/addresses'" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-md">
                Back to Address List
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4">Create Address</h1>
        <form id="address-create-form" class="space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <label for="streetOne" class="block font-semibold mb-1">Street One</label>
                <input type="text" id="streetOne" name="streetOne" class="border p-2 rounded w-full" required>

                <label for="streetTwo" class="block font-semibold mb-1">Street Two</label>
                <input type="text" id="streetTwo" name="streetTwo" class="border p-2 rounded w-full">

                <label for="city" class="block font-semibold mb-1">City</label>
                <input type="text" id="city" name="city" class="border p-2 rounded w-full" required>

                <label for="state" class="block font-semibold mb-1">State</label>
                <input type="text" id="state" name="state" class="border p-2 rounded w-full" required>

                <label for="zipCode" class="block font-semibold mb-1">Zip Code</label>
                <input type="text" id="zipCode" name="zipCode" class="border p-2 rounded w-full" required>
            </div>
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Create Address</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('address-create-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                const jsonData = {};
                form.querySelectorAll('input, select, textarea').forEach(input => {
                    if (input.type === 'checkbox') {
                        jsonData[input.name] = input.checked;
                    } else {
                        jsonData[input.name] = input.value;
                    }
                });
                try {
                    const response = await fetch('/api/post/address', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    });
                    const result = await response.json();
                    if (response.ok && result.success) {
                        alert('Address created successfully!');
                        window.location.href = '/addresses';
                    } else {
                        alert('Error: ' + (result.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error creating address: ' + error.message);
                }
            });
        }
    </script>
</body>
</html>
