{% extends 'shared/layout/base.html' %}

{% block title %}Edit Vendor{% endblock %}

{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Edit Vendor</h1>
      <a href="{{ url_for('web_vendor.list_vendors_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Back to Vendors</a>
    </div>

    <form id="edit-vendor-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <div class="space-y-4 bg-white border border-gray-200 p-4">
        <div>
          <label for="guid" class="block text-sm font-medium text-gray-700 px-1 py-1">GUID</label>
          <input type="text" id="guid" name="guid" value="{{ vendor.guid }}" readonly class="block w-full rounded-md border-2 border-gray-200 bg-gray-50 shadow-sm px-3 py-2 text-gray-900" />
        </div>
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-1 py-1">Name</label>
          <input type="text" id="name" name="name" value="{{ vendor.name }}" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>
        <div>
          <label for="abbreviation" class="block text-sm font-medium text-gray-700 px-1 py-1">Abbreviation</label>
          <input type="text" id="abbreviation" name="abbreviation" value="{{ vendor.abbreviation or '' }}" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
        </div>
        <div class="flex items-center space-x-2">
          <input type="checkbox" id="isActive" name="isActive" class="h-4 w-4" {% if vendor.is_active %}checked{% endif %}>
          <label for="isActive" class="text-sm font-medium text-gray-700">Active</label>
        </div>
        <div>
          <label for="vendortype" class="block text-sm font-medium text-gray-700 px-1 py-1">Vendor Type</label>
          <select id="vendortype" name="vendortype" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
            <option value="">Select a vendor type</option>
            {% if vendor_types %}
              {% for vendor_type in vendor_types %}
                {% if vendor_type.id == vendor.vendor_type_id %}
                  <option value="{{ vendor_type.guid }}" selected>{{ vendor_type.name }}</option>
                {% else %}
                  <option value="{{ vendor_type.guid }}">{{ vendor_type.name }}</option>
                {% endif %}
              {% endfor %}
            {% endif %}
          </select>
        </div>
      </div>

      <div class="mt-2 mb-2 px-4 py-2">
        <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('edit-vendor-form');
  
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Get form data
    const guid = document.getElementById('guid').value.trim();
    const name = document.getElementById('name').value.trim();
    const abbreviation = document.getElementById('abbreviation').value.trim();
    const isActive = document.getElementById('isActive').checked;
    const vendorType = document.getElementById('vendortype').value;
    console.log('Form Data:', { name, abbreviation, isActive, vendorType });
    
    // Validate required fields
    if (!name) {
      alert('Please provide a vendor name.');
      return;
    }
    
    try {
      // Get CSRF token
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      
      // Prepare request data
      const requestData = {
        name: name,
        abbreviation: abbreviation,
        isActive: isActive ? 1 : 0,
        vendorType: vendorType
      };
      
      // Make API call - Fixed URL
      const response = await fetch(`/api/patch/vendor/${guid}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(requestData)
      });
      
      // Handle response
      const result = await response.json();
      
      if (response.ok && result.success) {
        alert('Vendor updated successfully!');
        window.location.href = `{{ url_for('web_vendor.view_vendor_route', vendor_guid='__GUID__') }}`.replace('__GUID__', guid);
      } else {
        alert(result.message || `Update failed (HTTP ${response.status})`);
      }
    } catch (error) {
      console.error('Update error:', error);
      alert(`Error: ${error.message}`);
    }
  });
});
</script>
{% endblock %}
