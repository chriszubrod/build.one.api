<label for="vendorname">Vendor Name:</label>
{% if readonly %}
    <span class="readonly-field">{{ vendor.vendorname }}</span>
{% else %}
    <input type="text" id="vendorname" name="vendorname" value="{{ vendor.vendorname if vendor else '' }}" required>
{% endif %}

<label for="isActive">Active:</label>
{% if readonly %}
    <span class="readonly-field">{{ vendor.isActive }}</span>
{% else %}
    <input type="checkbox" id="isActive" name="isActive" value="1" checked>
{% endif %}
