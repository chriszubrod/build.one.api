{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/header.css') }}?v={{ range(1000, 9999) | random }}">
{% endblock %}


<header class="app-header">
    <div class="header-container">
        <!-- Logo section -->
        <div class="header-logo">
            <a href="/dashboard" class="logo-link">
                <span aria-hidden="true">b1</span>
                <span>Build.One</span>
            </a>
            <div class="logo-organization">
                <span>{{ current_user.organization_name if current_user and current_user.organization_name else 'Organization' }}</span>
            </div>
        </div>

        <!-- User section -->
        <div class="header-user">
            {% if current_user %}
                <div class="user-info">
                    <span class="user-name">{{ current_user.username }}</span>
                    <a href="/auth/logout" class="logout-link">Log out</a>
                </div>
            {% else %}
                <div class="auth-links">
                    <a href="/auth/login" class="auth-link">Log in</a>
                    <a href="/auth/signup" class="auth-link auth-link--primary">Sign up</a>
                </div>
            {% endif %}
        </div>
    </div>
</header>
