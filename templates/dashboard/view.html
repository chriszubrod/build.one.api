{% extends 'shared/layout/base.html' %}

{% block title %}Dashboard - Build.One{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}?v={{ range(1000, 9999) | random }}">
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>Welcome, {{ current_user.username }}</h1>
    </div>
    
    <div class="dashboard-content">
        <div class="dashboard-placeholder">
            <h2>Your Dashboard</h2>
            <p>Personalized tasks, projects, and activity coming soon.</p>
            <a href="/admin" class="btn btn-secondary">Go to Admin</a>
        </div>
    </div>
</div>
{% endblock %}
