<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Organization - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-plus me-2"></i>Create Organization
                    </h1>
                    <a href="/organization/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-building me-2"></i>Organization Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createOrganizationForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label">
                                        Organization Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="name" 
                                           name="name" 
                                           required 
                                           maxlength="255"
                                           placeholder="Enter organization name">
                                    <div class="form-text">Required field. Maximum 255 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="website" class="form-label">
                                        Website
                                    </label>
                                    <input type="url" 
                                           class="form-control" 
                                           id="website" 
                                           name="website" 
                                           maxlength="255"
                                           placeholder="https://example.com">
                                    <div class="form-text">Optional. Include the full URL including https://</div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/organization/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Create Organization
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createOrganizationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                website: formData.get('website') || null
            };

            try {
                const response = await fetch('/api/v1/create/organization', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    window.location.href = '/organization/list';
                } else {
                    const error = await response.json();
                    alert('Error creating organization: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating organization: ' + error.message);
            }
        });
    </script>
</body>
</html>
