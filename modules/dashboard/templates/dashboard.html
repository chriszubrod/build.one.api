<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto mt-12 p-8 bg-white rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-center">Dashboard</h1>
        <div class="mb-8 text-center text-gray-700 text-lg">
            Welcome to your dashboard! Here you can see an overview of your application.
        </div>
        <!-- Dashboard widgets or content go here -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-blue-100 rounded-lg p-6 shadow text-center">
                <h2 class="text-xl font-semibold mb-2">Widget 1</h2>
                <p class="text-gray-600">This is a placeholder for a dashboard widget.</p>
            </div>
            <div class="bg-green-100 rounded-lg p-6 shadow text-center">
                <h2 class="text-xl font-semibold mb-2">Widget 2</h2>
                <p class="text-gray-600">Add more widgets or stats here.</p>
            </div>
        </div>
    </div>
</body>
</html>
