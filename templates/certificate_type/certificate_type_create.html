{% extends 'shared/layout/base.html' %}
{% block title %}Certificate Type{% endblock %}
{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Create Certificate Type</h1>
      <a href="{{ url_for('web_certificate_type.list_certificate_types_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Back to Certificate Types</a>
    </div>
    <form id="create-certificate-type-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label for="abbreviation" class="block text-sm font-medium text-gray-700 px-3 py-2">Abbreviation</label>
          <input type="text" id="abbreviation" name="abbreviation" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
        </div>
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-3 py-2">Name</label>
          <input type="text" id="name" name="name" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
        </div>
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 px-3 py-2">Description</label>
          <input type="text" id="description" name="description" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
        </div>
      </div>
      <div class="flex items-center justify-between border-b border-gray-100 py-2">
        <button type="submit" class="mt-2 mb-2 px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Submit</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('create-certificate-type-form');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const abbreviation = document.getElementById('abbreviation').value.trim();
    const name = document.getElementById('name').value.trim();
    const description = document.getElementById('description').value.trim();
    if (!name || !abbreviation || !description) { alert('Please enter a name, abbreviation, and description.'); return; }
    try {
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      const resp = await fetch('{{ url_for("api_certificate_type.api_post_certificate_type_route") }}', {
        method: 'POST', 
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        }, 
        body: JSON.stringify({ name, abbreviation, description })
      });
      const result = await resp.json();
      if (result.success) { window.location.href = '{{ url_for("web_certificate_type.list_certificate_types_route") }}'; }
      else { alert(result.message || 'Create failed'); }
    } catch (err) { alert(err.message); }
  });
});
</script>
{% endblock %}
