{% extends 'shared/layout/base.html' %}

{% block content %}

    <h1>Edit Vendor</h1>

    <span>{{ vendor.guid }}</span>

    <form id="vendorForm" autocomplete="off" onsubmit="return false;">

        {% include 'vendor/_form.html' %}

        <button type="submitButton" id="submitButton" >Submit</button>

    </form>

{% endblock %}

<script src="{{ url_for('static', filename='js/form-handler.js') }}" defer></script>

<script defer>
    document.addEventListener('DOMContentLoaded', function() {
        FormHandler.init('vendorForm', '/api/put/vendor', 'PUT');
    });
</script>
