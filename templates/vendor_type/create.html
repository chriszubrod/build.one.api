<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Vendor Type - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-tag me-2"></i>Create Vendor Type
                    </h1>
                    <a href="/vendor-type/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-info-circle me-2"></i>Vendor Type Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createVendorTypeForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label">
                                        Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="name"
                                           name="name"
                                           required
                                           maxlength="50"
                                           placeholder="Enter vendor type name">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">
                                        Description <span class="text-danger">*</span>
                                    </label>
                                    <textarea class="form-control"
                                              id="description"
                                              name="description"
                                              rows="4"
                                              required
                                              maxlength="255"
                                              placeholder="Enter vendor type description"></textarea>
                                    <div class="form-text">Required field. Maximum 255 characters.</div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/vendor-type/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Create Vendor Type
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createVendorTypeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const payload = {
                name: formData.get('name'),
                description: formData.get('description')
            };

            try {
                const response = await fetch('/api/v1/create/vendor-type', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/vendor-type/list';
                } else {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        alert('Error creating vendor type: ' + (error.detail || error.message || 'Unknown error'));
                    } else {
                        const errorText = await response.text();
                        alert('Error creating vendor type: ' + errorText);
                    }
                }
            } catch (error) {
                alert('Error creating vendor type: ' + error.message);
            }
        });
    </script>
</body>
</html>
