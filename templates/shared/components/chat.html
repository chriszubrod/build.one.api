<div class="chat-window">
    <div class="chat-messages" id="chatMessages">
        <!-- Messages will be dynamically added here -->
    </div>
    
    <div class="chat-input">
        <textarea 
            id="messageInput" 
            placeholder="Type your message..." 
            rows="2"
        ></textarea>
        <button class="send-message" id="sendMessage" type="button">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<style>
    .chat-window {
        /* Remove fixed positioning and adjust to fill sidebar */
        position: relative;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--color-border);
    }

    .chat-header {
        padding: var(--spacing-sm);
        background-color: var(--color-primary);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0; /* Prevent header from shrinking */
    }

    .chat-header h3 {
        margin: 0;
        font-size: 1rem;
        font-weight: 500;
    }

    .minimize-chat {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        padding: var(--spacing-xs);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
    }

    .minimize-chat:hover {
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
    }

    .chat-messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: var(--spacing-sm);
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        background-color: var(--color-background);
    }

    .message {
        max-width: 80%;
        padding: var(--spacing-sm);
        border-radius: var(--border-radius);
        margin: 2px 0;
        word-wrap: break-word;
    }

    .message.user {
        background-color: var(--color-primary);
        color: white;
        align-self: flex-end;
    }

    .message.assistant {
        background-color: var(--color-hover);
        color: #333;
        align-self: flex-start;
    }

    .chat-input {
        padding: var(--spacing-sm);
        border-top: 1px solid var(--color-border);
        display: flex;
        gap: var(--spacing-sm);
        background-color: white;
        flex-shrink: 0; /* Prevent input area from shrinking */
    }

    .chat-input textarea {
        flex-grow: 1;
        border: 1px solid var(--color-border);
        border-radius: var(--border-radius);
        padding: var(--spacing-xs);
        resize: none;
        font-family: inherit;
        font-size: 0.9rem;
        min-height: 40px;
        max-height: 100px;
    }

    .chat-input textarea:focus {
        outline: none;
        border-color: var(--color-primary);
    }

    .send-message {
        background-color: var(--color-primary);
        color: white;
        border: none;
        border-radius: var(--border-radius);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        align-self: flex-end;
    }

    .send-message:hover {
        background-color: var(--color-primary-dark);
    }

    /* Scrollbar styling */
    .chat-messages::-webkit-scrollbar {
        width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    .chat-messages::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    /* Minimized state */
    .chat-window.minimized {
        height: auto;
    }

    .chat-window.minimized .chat-messages,
    .chat-window.minimized .chat-input {
        display: none;
    }
</style>

<script>
// Make sure these functions are in global scope
window.handleChatMessage = async function() {
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');
    const message = messageInput.value.trim();
    if (!message) return;

    try {
        // Show message in chat immediately
        addMessage(message, 'user');
        
        // Clear input
        messageInput.value = '';

        // Show loading state
        const loadingMessage = addMessage('', 'assistant loading');
        loadingMessage.innerHTML = `
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        `;

        // Prepare request body
        const requestBody = {
            message: message,
            timestamp: new Date().toISOString()
        };

        // Send to API
        const response = await fetch('/api/chat/message', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(requestBody)
        });

        // Remove loading message
        loadingMessage.remove();

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        if (data.success) {
            console.log('Data.SuccessResponse:', data);
            addMessage(data.data, 'assistant');
        } else {
            throw new Error(data.message || 'Failed to get response');
        }

    } catch (error) {
        console.error('Error sending message:', error);
        addMessage('Sorry, there was an error sending your message. Please try again.', 'error');
    }
}

function addMessage(text, type) {
    const chatMessages = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}`;
    
    if (type !== 'assistant loading') {
        const timestamp = document.createElement('div');
        timestamp.className = 'message-timestamp';
        timestamp.textContent = new Date().toLocaleTimeString();
        
        const content = document.createElement('div');
        content.className = 'message-content';
        content.textContent = text;
        
        messageDiv.appendChild(content);
        messageDiv.appendChild(timestamp);
    }
    
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    
    return messageDiv;
}

// Add event listeners when the DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM Content Loaded - Setting up chat handlers');
    
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendMessage');
    
    // Debug log to verify elements are found
    console.log('Send button:', sendButton);
    console.log('Message input:', messageInput);

    if (sendButton) {
        // Add click handler directly
        sendButton.onclick = handleChatMessage;
        
        // Also add through addEventListener for redundancy
        sendButton.addEventListener('click', handleChatMessage);
        console.log('Click handlers attached to send button');
    }

    if (messageInput) {
        // Enter key to send
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChatMessage();
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    }
});
</script>
