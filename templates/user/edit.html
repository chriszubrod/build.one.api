{% extends 'shared/layout/base.html' %}

{% block content %}

    <h1>Edit User</h1>

    <span>{{ user.guid }}</span>

    <form id="userForm" autocomplete="off" onsubmit="return false;">

        <h3>User Information</h3>
        {% include 'user/_form.html' %}

        <button type="submitButton" id="submitButton">Submit</button>

    </form>

{% endblock %}

<script src="{{ url_for('static', filename='js/form-handler.js') }}" defer></script>

<script defer>
    document.addEventListener('DOMContentLoaded', function() {
        FormHandler.init('userForm', '/api/put/user', 'PUT');
    });
</script>
