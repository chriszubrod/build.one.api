<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Role Module - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-puzzle-piece me-2"></i>Create Role Module
                    </h1>
                    <a href="/role_module/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-layer-group me-2"></i>Role Module Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createRoleModuleForm">
                                <div class="mb-3">
                                    <label for="role_id" class="form-label">
                                        Role <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="role_id" name="role_id" required>
                                        <option value="">Select Role</option>
                                        {% for role in roles %}
                                        <option value="{{ role.id }}">{{ role.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="module_id" class="form-label">
                                        Module <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="module_id" name="module_id" required>
                                        <option value="">Select Module</option>
                                        {% for module in modules %}
                                        <option value="{{ module.id }}">{{ module.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/role_module/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Create Role Module
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createRoleModuleForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const payload = {
                role_id: formData.get('role_id'),
                module_id: formData.get('module_id')
            };

            try {
                const response = await fetch('/api/v1/create/role_module', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/role_module/list';
                } else {
                    const error = await response.json();
                    alert('Error creating role module: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating role module: ' + error.message);
            }
        });
    </script>
</body>
</html>
