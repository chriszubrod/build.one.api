<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel, .btn-delete {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-user-edit me-2"></i>Edit User
                    </h1>
                    <a href="/user/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-id-card me-2"></i>User Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="editUserForm">
                                <input type="hidden" id="public_id" name="public_id" value="{{ user.public_id }}">
                                <input type="hidden" id="row_version" name="row_version" value="{{ user.row_version }}">

                                <div class="mb-3">
                                    <label for="firstname" class="form-label">
                                        Firstname <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="firstname"
                                           name="firstname"
                                           required
                                           maxlength="50"
                                           value="{{ user.firstname or '' }}"
                                           placeholder="Enter firstname">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="lastname" class="form-label">
                                        Lastname <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="lastname"
                                           name="lastname"
                                           required
                                           maxlength="50"
                                           value="{{ user.lastname or '' }}"
                                           placeholder="Enter lastname">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                    <div class="mb-3">
                                        <div class="row">
                                            <div class="col-md-6">
                                                <small class="text-muted">
                                                    <i class="fas fa-calendar-plus me-1"></i>
                                                    Created: {{ user.created_datetime or 'Unknown' }}
                                                </small>
                                            </div>
                                            <div class="col-md-6">
                                                <small class="text-muted">
                                                    <i class="fas fa-calendar-edit me-1"></i>
                                                    Modified: {{ user.modified_datetime or 'Unknown' }}
                                                </small>
                                            </div>
                                        </div>
                                    </div>

                                <div class="d-flex justify-content-between">
                                    <div>
                                        <button type="button" class="btn btn-danger btn-delete" onclick="deleteUser()">
                                            <i class="fas fa-trash me-1"></i>Delete
                                        </button>
                                    </div>
                                    <div>
                                        <a href="/user/list" class="btn btn-secondary btn-cancel">
                                            <i class="fas fa-times me-1"></i>Cancel
                                        </a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save me-1"></i>Update User
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('editUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                firstname: formData.get('firstname'),
                lastname: formData.get('lastname'),
                row_version: formData.get('row_version')
            };

            try {
                const response = await fetch(`/api/v1/update/user/${formData.get('public_id')}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = '/user/list';
                } else {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        let message = 'Unknown error';
                        if (error.detail) {
                            message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                        } else if (error.message) {
                            message = error.message;
                        } else if (typeof error === 'string') {
                            message = error;
                        } else {
                            message = JSON.stringify(error);
                        }
                        alert('Error updating user: ' + message);
                    } else {
                        const errorText = await response.text();
                        alert('Error updating user: ' + errorText);
                    }
                }
            } catch (error) {
                alert('Error updating user: ' + error.message);
            }
        });

        async function deleteUser() {
            if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                const formData = new FormData(document.getElementById('editUserForm'));

                try {
                    const response = await fetch(`/api/v1/delete/user/${formData.get('public_id')}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ row_version: formData.get('row_version') })
                    });

                    if (response.ok) {
                        window.location.href = '/user/list';
                    } else {
                        const contentType = response.headers.get('content-type');
                        if (contentType && contentType.includes('application/json')) {
                            const error = await response.json();
                            let message = 'Unknown error';
                            if (error.detail) {
                                message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                            } else if (error.message) {
                                message = error.message;
                            } else if (typeof error === 'string') {
                                message = error;
                            } else {
                                message = JSON.stringify(error);
                            }
                            alert('Error deleting user: ' + message);
                        } else {
                            const errorText = await response.text();
                            alert('Error deleting user: ' + errorText);
                        }
                    }
                } catch (error) {
                    alert('Error deleting user: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
