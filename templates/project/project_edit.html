{% extends 'shared/layout/base.html' %}

{% block title %}Edit Project{% endblock %}

{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Edit Project</h1>
      <a href="{{ url_for('web_project.view_project_route', project_guid=project.guid) }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Cancel</a>
    </div>

    <form id="edit-project-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <div class="grid grid-cols-1 gap-4 bg-white border border-gray-200 p-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-1 py-1">Name</label>
          <input type="text" id="name" name="name" value="{{ project.name }}" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>

        <div>
          <label for="abbreviation" class="block text-sm font-medium text-gray-700 px-1 py-1">Abbreviation</label>
          <input type="text" id="abbreviation" name="abbreviation" value="{{ project.abbreviation }}" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>

        <div>
          <label for="status" class="block text-sm font-medium text-gray-700 px-1 py-1">Status</label>
          <select id="status" name="status" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
            <option value="P" {% if project.status == 'P' %}selected{% endif %}>Planning</option>
            <option value="D" {% if project.status == 'D' %}selected{% endif %}>Design</option>
            <option value="B" {% if project.status == 'B' %}selected{% endif %}>Build</option>
            <option value="C" {% if project.status == 'C' %}selected{% endif %}>Complete</option>
          </select>
        </div>

        <div>
          <label for="customerGuid" class="block text-sm font-medium text-gray-700 px-1 py-1">Customer</label>
          <select id="customerGuid" name="customerGuid" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
            {% for c in customers %}
              <option value="{{ c.guid }}" {% if c.id == project.customer_id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mt-2 mb-2 px-4 py-2">
        <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Save</button>
      </div>
    </form>

    <div class="mt-4 bg-white border border-gray-200 p-4">
      <h2 class="text-base font-semibold text-gray-800 mb-2">Link to Intuit Customer</h2>
      <p class="text-sm text-gray-600 mb-3">Choose a QuickBooks project/customer from the dropdown to create a link.</p>

      <div class="flex items-center space-x-2">
        <select id="intuitProjectSelect" class="block w-80 rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
          <option value="">Select an Intuit customer</option>
          {% if intuit_projects %}
            {% for ic in intuit_projects %}
              <option value="{{ ic.guid }}" data-id="{{ ic.id }}" {% if mapped_intuit_customer and mapped_intuit_customer.guid == ic.guid %}selected{% endif %}>{{ ic.display_name }}</option>
            {% endfor %}
          {% endif %}
          {% if mapped_intuit_customer %}
            <!-- Add the mapped customer if it's not in the available list -->
            <option value="{{ mapped_intuit_customer.guid }}" data-id="{{ mapped_intuit_customer.id }}" selected>{{ mapped_intuit_customer.display_name }} (Currently Mapped)</option>
          {% endif %}
        </select>
        <button id="mapIntuitProjectBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50" {% if not intuit_projects %}disabled{% endif %}>
          {% if mapped_intuit_customer %}Update Mapping{% else %}Map Project{% endif %}
        </button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('edit-project-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const guid = '{{ project.guid }}';
    const name = document.getElementById('name').value.trim();
    const abbreviation = document.getElementById('abbreviation').value.trim();
    const status = document.getElementById('status').value;
    const customerGuid = document.getElementById('customerGuid').value;
    if (!name || !abbreviation || !status || !customerGuid) { alert('Please complete all fields.'); return; }
    try {
      // Get CSRF token
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      
      const resp = await fetch(`/api/project/${guid}`, {
        method: 'PATCH',
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ name, abbreviation, status, customerGuid })
      });
      if (!resp.ok) { const text = await resp.text(); throw new Error(`HTTP ${resp.status}: ${text}`); }
      const result = await resp.json();
      if (result.success) { window.location.href = `{{ url_for('web_project.view_project_route', project_guid='__GUID__') }}`.replace('__GUID__', guid); }
      else { alert(result.message || 'Update failed'); }
    } catch (err) { console.error(err); alert(`Error: ${err.message}`); }
  });
  
  // Intuit Customer Mapping for Project
  const mapButton = document.getElementById('mapIntuitProjectBtn');
  const intuitSelect = document.getElementById('intuitProjectSelect');
  if (mapButton && intuitSelect) {
    mapButton.addEventListener('click', async () => {
      const projectGuid = '{{ project.guid }}';
      const intuitCustomerGuid = intuitSelect.value;
      if (!intuitCustomerGuid) { alert('Please select an Intuit customer.'); return; }
      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const response = await fetch('/api/post/map/project-intuit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
          body: JSON.stringify({ projectGuid, intuitCustomerGuid })
        });
        const result = await response.json();
        if (response.ok && result.success) { alert('Project mapped successfully!'); window.location.reload(); }
        else { alert(result.message || `Mapping failed (HTTP ${response.status})`); }
      } catch (err) { console.error(err); alert(`Error: ${err.message}`); }
    });
  }
});
</script>
{% endblock %}
