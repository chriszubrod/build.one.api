<!-- AI Copilot Chat Panel (visible by default) -->
<div id="copilot-panel" class="aside-panel aside-panel-open">
    <div class="aside-panel-header">
        <!-- Tab bar replaces static heading when Thread is available -->
        <div class="copilot-tabs" id="copilot-tabs">
            <button class="copilot-tab active" data-copilot-tab="chat">Chat</button>
            <button class="copilot-tab" data-copilot-tab="thread" id="copilot-thread-tab" style="display:none;">Thread</button>
        </div>
        <div class="copilot-header-actions">
            <button type="button" class="copilot-new-chat-btn" onclick="newCopilotChat()" aria-label="New Chat" title="New Chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
            <button type="button" class="aside-close-btn" onclick="toggleCopilot()" aria-label="Close">&times;</button>
        </div>
    </div>

    <!-- Chat panel -->
    <div class="aside-panel-body copilot-body" id="copilot-chat-panel">
        <!-- Quick Actions -->
        <div id="copilot-quick-actions" class="copilot-quick-actions">
            <button type="button" class="copilot-quick-btn" onclick="sendQuickAction('What\\'s the current status?')">
                📊 Status
            </button>
            <button type="button" class="copilot-quick-btn" onclick="sendQuickAction('Show me documents that need review')">
                📄 Pending
            </button>
            <button type="button" class="copilot-quick-btn" onclick="sendQuickAction('What can you help me with?')">
                ❓ Help
            </button>
        </div>

        <!-- Chat Messages -->
        <div id="copilot-messages" class="copilot-messages">
            <div class="copilot-message copilot-message-assistant">
                <div class="copilot-message-content">
                    Hello! I'm your Build.One AI assistant. How can I help you today?
                </div>
            </div>
        </div>
    </div>

    <!-- Thread panel (hidden by default) -->
    <div class="aside-panel-body copilot-thread-panel" id="copilot-thread-panel" style="display:none;">
        <div id="thread-loading" class="thread-empty-state">Loading thread...</div>
        <div id="thread-empty" class="thread-empty-state" style="display:none;">No other messages in this thread.</div>
        <div id="thread-messages"></div>
    </div>

    <!-- Input Area (only visible on Chat tab) -->
    <div class="copilot-input-area" id="copilot-input-area">
        <form id="copilot-form" onsubmit="sendCopilotMessage(event)">
            <div class="copilot-input-container">
                <input
                    type="text"
                    id="copilot-input"
                    class="copilot-input"
                    placeholder="Ask me anything..."
                    autocomplete="off"
                >
                <button type="submit" class="copilot-send-btn" aria-label="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let copilotConversationId = null;
let copilotOpen = true;

function toggleCopilot() {
    const sidebar = document.querySelector('.sidebar-right');
    const copilotPanel = document.getElementById('copilot-panel');
    const toggleBtn = document.getElementById('copilot-toggle-btn');
    
    // Close any other open panels first
    const otherPanels = sidebar.querySelectorAll('.aside-panel.aside-panel-open');
    otherPanels.forEach(panel => {
        if (panel.id !== 'copilot-panel') {
            panel.classList.remove('aside-panel-open');
        }
    });
    
    copilotOpen = !copilotOpen;
    
    if (copilotOpen) {
        sidebar.classList.add('sidebar-right-open');
        copilotPanel.classList.add('aside-panel-open');
        toggleBtn.classList.add('copilot-toggle-hidden');
        document.getElementById('copilot-input').focus();
    } else {
        copilotPanel.classList.remove('aside-panel-open');
        toggleBtn.classList.remove('copilot-toggle-hidden');
        // Only close sidebar if no other panels are open
        const openPanels = sidebar.querySelectorAll('.aside-panel.aside-panel-open');
        if (openPanels.length === 0) {
            sidebar.classList.remove('sidebar-right-open');
        }
    }
}

function sendQuickAction(message) {
    document.getElementById('copilot-input').value = message;
    sendCopilotMessage(new Event('submit'));
}

async function sendCopilotMessage(event) {
    event.preventDefault();
    
    const input = document.getElementById('copilot-input');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Add user message to chat
    addCopilotMessage(message, 'user');
    input.value = '';
    
    // Show typing indicator
    const typingId = addCopilotTypingIndicator('Thinking...');
    
    // Set up timeout
    const timeoutMs = 120000; // 120 seconds (agent may need multiple tool rounds)
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
    
    try {
        // Update status to show we're working
        updateCopilotTypingStatus(typingId, 'Processing...');
        
        const response = await fetch('/api/v1/copilot/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: message,
                conversation_id: copilotConversationId
            }),
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }
        
        const data = await response.json();
        
        // Store conversation ID for context
        copilotConversationId = data.conversation_id;
        
        // Remove typing indicator and add response
        removeCopilotTypingIndicator(typingId);
        addCopilotMessage(data.message, 'assistant', data.suggestions, data.sources);
        
    } catch (error) {
        clearTimeout(timeoutId);
        removeCopilotTypingIndicator(typingId);
        
        if (error.name === 'AbortError') {
            addCopilotMessage('⏱️ Request timed out. The server took too long to respond. Please try again.', 'assistant');
        } else {
            addCopilotMessage(`❌ Error: ${error.message}. Please try again.`, 'assistant');
        }
        console.error('Copilot error:', error);
    }
}

function addCopilotMessage(content, role, suggestions = [], sources = []) {
    const messagesContainer = document.getElementById('copilot-messages');
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `copilot-message copilot-message-${role}`;
    
    // Convert markdown-style formatting
    let formattedContent = content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    
    let html = `<div class="copilot-message-content">${formattedContent}</div>`;
    
    // Add suggestions if present
    if (suggestions && suggestions.length > 0) {
        html += '<div class="copilot-suggestions">';
        suggestions.forEach(suggestion => {
            html += `<button type="button" class="copilot-suggestion-btn" onclick="sendQuickAction('${suggestion.replace(/'/g, "\\'")}')">${suggestion}</button>`;
        });
        html += '</div>';
    }
    
    // Add sources if present
    if (sources && sources.length > 0) {
        html += '<div class="copilot-sources"><small>Sources: ';
        sources.forEach((source, i) => {
            if (i > 0) html += ', ';
            html += `<span class="copilot-source">${source.filename || 'Document'}</span>`;
        });
        html += '</small></div>';
    }
    
    messageDiv.innerHTML = html;
    messagesContainer.appendChild(messageDiv);
    
    // Scroll to bottom
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function addCopilotTypingIndicator(statusText = 'Thinking...') {
    const id = 'typing-' + Date.now();
    const messagesContainer = document.getElementById('copilot-messages');
    
    const typingDiv = document.createElement('div');
    typingDiv.id = id;
    typingDiv.className = 'copilot-message copilot-message-assistant copilot-typing';
    typingDiv.innerHTML = `
        <div class="copilot-message-content">
            <div class="copilot-typing-status">
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-text">${statusText}</span>
            </div>
        </div>
    `;
    
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    return id;
}

function updateCopilotTypingStatus(id, statusText) {
    const element = document.getElementById(id);
    if (element) {
        const textSpan = element.querySelector('.copilot-typing-text');
        if (textSpan) {
            textSpan.textContent = statusText;
        }
    }
}

function removeCopilotTypingIndicator(id) {
    const element = document.getElementById(id);
    if (element) {
        element.remove();
    }
}

function newCopilotChat() {
    // Reset conversation ID to start fresh
    copilotConversationId = null;
    
    // Clear messages and show welcome message
    const messagesContainer = document.getElementById('copilot-messages');
    messagesContainer.innerHTML = `
        <div class="copilot-message copilot-message-assistant">
            <div class="copilot-message-content">
                Hello! I'm your Build.One AI assistant. How can I help you today?
            </div>
        </div>
    `;
    
    // Focus input
    document.getElementById('copilot-input').focus();
}

// Close copilot when another panel opens (called from picker functions)
function closeCopilotPanel() {
    const copilotPanel = document.getElementById('copilot-panel');
    const toggleBtn = document.getElementById('copilot-toggle-btn');
    
    if (copilotPanel) {
        copilotPanel.classList.remove('aside-panel-open');
    }
    if (toggleBtn) {
        toggleBtn.classList.remove('copilot-toggle-hidden');
    }
    copilotOpen = false;
}

// Make closeCopilotPanel available globally for picker scripts
window.closeCopilotPanel = closeCopilotPanel;

// ── Thread Tab ─────────────────────────────────────────────────────
let threadLoaded = false;
let threadCache = null;

// Tab switching
document.querySelectorAll('.copilot-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.copilot-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');

        const target = this.dataset.copilotTab;
        const chatPanel = document.getElementById('copilot-chat-panel');
        const threadPanel = document.getElementById('copilot-thread-panel');
        const inputArea = document.getElementById('copilot-input-area');

        if (target === 'thread') {
            chatPanel.style.display = 'none';
            inputArea.style.display = 'none';
            threadPanel.style.display = '';
            if (!threadLoaded) loadThread();
        } else {
            chatPanel.style.display = '';
            inputArea.style.display = '';
            threadPanel.style.display = 'none';
        }
    });
});

// Detect inbox message page and show Thread tab
(function initThreadTab() {
    const ctx = document.getElementById('thread-context');
    if (!ctx) return;

    const messageId = ctx.dataset.messageId;
    const conversationId = ctx.dataset.conversationId;
    if (!messageId || !conversationId) return;

    // Show the Thread tab button
    const threadTab = document.getElementById('copilot-thread-tab');
    if (threadTab) threadTab.style.display = '';
})();

async function loadThread() {
    const ctx = document.getElementById('thread-context');
    if (!ctx) return;

    const messageId = ctx.dataset.messageId;
    if (!messageId) return;

    const loadingEl = document.getElementById('thread-loading');
    const emptyEl = document.getElementById('thread-empty');
    const container = document.getElementById('thread-messages');

    loadingEl.style.display = '';
    emptyEl.style.display = 'none';
    container.innerHTML = '';

    try {
        const resp = await fetch(`/inbox/message/${messageId}/thread`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        threadLoaded = true;
        threadCache = data.messages || [];

        loadingEl.style.display = 'none';

        if (threadCache.length === 0) {
            emptyEl.style.display = '';
            return;
        }

        container.innerHTML = threadCache.map(msg => {
            const isCurrent = msg.is_current;
            const dt = msg.received_datetime
                ? new Date(msg.received_datetime).toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                  })
                : '';
            const sender = msg.from_name || msg.from_email || 'Unknown';
            const preview = (msg.body_preview || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const attBadge = msg.has_attachments
                ? `<span class="thread-att-badge">📎 ${msg.attachment_count || ''}</span>`
                : '';

            return `<div class="thread-message ${isCurrent ? 'thread-message-current' : ''}" data-msg-id="${msg.message_id}">
                <div class="thread-msg-header">
                    <span class="thread-msg-sender">${sender}</span>
                    <span class="thread-msg-date">${dt}</span>
                </div>
                <div class="thread-msg-subject">${(msg.subject || '(no subject)').replace(/</g, '&lt;')}</div>
                <div class="thread-msg-preview">${preview}</div>
                ${attBadge}
                ${!isCurrent ? `<button class="thread-msg-view-btn" onclick="window.location.href='/inbox/message/${msg.message_id}'">View</button>` : ''}
            </div>`;
        }).join('');
    } catch (err) {
        loadingEl.style.display = 'none';
        container.innerHTML = `<div class="thread-empty-state" style="color:#dc2626;">Failed to load thread: ${err.message}</div>`;
    }
}
</script>
