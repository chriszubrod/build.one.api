<!-- Vendor Agent Chat Panel (visible by default) -->
<div id="vendor-agent-panel" class="aside-panel aside-panel-open">
    <div class="aside-panel-header">
        <h5>Vendor Agent</h5>
        <div class="copilot-header-actions">
            <button type="button" class="copilot-new-chat-btn" onclick="clearVendorAgentChat()" aria-label="Clear Chat" title="Clear Chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
            </button>
            <button type="button" class="aside-close-btn" onclick="toggleVendorAgentPanel()" aria-label="Close">&times;</button>
        </div>
    </div>

    <div class="aside-panel-body copilot-body">
        <!-- Pending Proposals Section -->
        <div id="vendor-agent-proposals" class="vendor-agent-proposals">
            <div class="vendor-agent-proposals-header">
                <span class="vendor-agent-proposals-title">Pending Proposals</span>
                <span id="vendor-agent-proposals-count" class="vendor-agent-proposals-badge">0</span>
            </div>
            <div id="vendor-agent-proposals-list" class="vendor-agent-proposals-list">
                <!-- Proposals will be loaded here -->
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="vendor-agent-messages" class="copilot-messages">
            <div class="copilot-message copilot-message-assistant">
                <div class="copilot-message-content">
                    Hello! I'm the Vendor Agent. I can help classify this vendor's type based on bills, documents, and other information. What would you like to know?
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="copilot-input-area">
        <form id="vendor-agent-form" onsubmit="sendVendorAgentMessage(event)">
            <div class="copilot-input-container">
                <input
                    type="text"
                    id="vendor-agent-input"
                    class="copilot-input"
                    placeholder="Ask about this vendor..."
                    autocomplete="off"
                >
                <button type="submit" class="copilot-send-btn" aria-label="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Proposal Action Modal -->
<div id="vendor-agent-modal" class="modal" style="display: none;" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="vendor-agent-modal-title">Proposal Details</h5>
                <button type="button" class="btn-close" onclick="closeVendorAgentModal()"></button>
            </div>
            <div class="modal-body" id="vendor-agent-modal-body">
                <!-- Modal content loaded dynamically -->
            </div>
            <div class="modal-footer" id="vendor-agent-modal-footer">
                <!-- Action buttons loaded dynamically -->
            </div>
        </div>
    </div>
</div>

<style>
/* Vendor Agent Proposals Section */
.vendor-agent-proposals {
    border-bottom: 1px solid #e5e7eb;
    padding: 0.75rem 1rem;
    background-color: #f9fafb;
}

.vendor-agent-proposals-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
}

.vendor-agent-proposals-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.vendor-agent-proposals-badge {
    background-color: #3b82f6;
    color: white;
    font-size: 0.7rem;
    padding: 0.125rem 0.5rem;
    border-radius: 1rem;
    font-weight: 600;
}

.vendor-agent-proposals-badge-zero {
    background-color: #d1d5db;
    color: #6b7280;
}

.vendor-agent-proposals-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.vendor-agent-proposals-empty {
    font-size: 0.8rem;
    color: #6b7280;
    font-style: italic;
}

/* Proposal Card */
.vendor-agent-proposal-card {
    background-color: white;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    padding: 0.75rem;
    cursor: pointer;
    transition: all 0.15s ease;
}

.vendor-agent-proposal-card:hover {
    border-color: #3b82f6;
    box-shadow: 0 2px 4px rgba(59, 130, 246, 0.1);
}

.vendor-agent-proposal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.375rem;
}

.vendor-agent-proposal-field {
    font-size: 0.8rem;
    font-weight: 500;
    color: #1f2937;
}

.vendor-agent-proposal-confidence {
    font-size: 0.7rem;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-weight: 500;
}

.vendor-agent-proposal-confidence-high {
    background-color: #d1fae5;
    color: #065f46;
}

.vendor-agent-proposal-confidence-medium {
    background-color: #fef3c7;
    color: #92400e;
}

.vendor-agent-proposal-confidence-low {
    background-color: #fee2e2;
    color: #991b1b;
}

.vendor-agent-proposal-change {
    font-size: 0.75rem;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 0.375rem;
}

.vendor-agent-proposal-arrow {
    color: #3b82f6;
}

.vendor-agent-proposal-new {
    font-weight: 500;
    color: #059669;
}

/* Modal Styles */
.vendor-agent-modal-section {
    margin-bottom: 1rem;
}

.vendor-agent-modal-section:last-child {
    margin-bottom: 0;
}

.vendor-agent-modal-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
}

.vendor-agent-modal-value {
    font-size: 0.875rem;
    color: #1f2937;
}

.vendor-agent-modal-reasoning {
    background-color: #f9fafb;
    border-radius: 0.375rem;
    padding: 0.75rem;
    font-size: 0.875rem;
    line-height: 1.5;
}

.vendor-agent-rejection-input {
    width: 100%;
    padding: 0.625rem;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    min-height: 80px;
    resize: vertical;
}

.vendor-agent-rejection-input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}
</style>

<script>
let vendorAgentPanelOpen = false;
let currentProposalPublicId = null;

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    loadVendorAgentContext();
});

function toggleVendorAgentPanel() {
    const sidebar = document.querySelector('.sidebar-right');
    const panel = document.getElementById('vendor-agent-panel');

    // Close the copilot panel if open
    if (typeof closeCopilotPanel === 'function') {
        closeCopilotPanel();
    }

    vendorAgentPanelOpen = !vendorAgentPanelOpen;

    if (vendorAgentPanelOpen) {
        sidebar.classList.add('sidebar-right-open');
        panel.classList.add('aside-panel-open');
        document.getElementById('vendor-agent-input').focus();
        loadVendorAgentContext();
    } else {
        panel.classList.remove('aside-panel-open');
        const openPanels = sidebar.querySelectorAll('.aside-panel.aside-panel-open');
        if (openPanels.length === 0) {
            sidebar.classList.remove('sidebar-right-open');
        }
    }
}

async function loadVendorAgentContext() {
    try {
        const response = await fetch(`/api/v1/vendor/${vendorPublicId}/agent-context`);
        if (!response.ok) {
            console.error('Failed to load agent context');
            return;
        }

        const data = await response.json();

        // Update proposals
        renderProposals(data.pending_proposals || []);

        // Update conversation
        renderConversation(data.conversation || []);

    } catch (error) {
        console.error('Error loading agent context:', error);
    }
}

function renderProposals(proposals) {
    const list = document.getElementById('vendor-agent-proposals-list');
    const countBadge = document.getElementById('vendor-agent-proposals-count');

    countBadge.textContent = proposals.length;
    countBadge.classList.toggle('vendor-agent-proposals-badge-zero', proposals.length === 0);

    if (proposals.length === 0) {
        list.innerHTML = '<div class="vendor-agent-proposals-empty">No pending proposals</div>';
        return;
    }

    list.innerHTML = proposals.map(p => {
        const field = p.fields && p.fields[0];
        const oldVal = field?.old_display_value || field?.old_value || '(none)';
        const newVal = field?.new_display_value || field?.new_value || '(none)';
        const fieldName = field?.field_name?.replace(/_/g, ' ') || 'Unknown';

        const confidence = p.confidence || 0;
        let confidenceClass = 'high';
        if (confidence < 0.5) confidenceClass = 'low';
        else if (confidence < 0.7) confidenceClass = 'medium';

        return `
            <div class="vendor-agent-proposal-card" onclick="showProposalDetails('${String(p.public_id)}')">
                <div class="vendor-agent-proposal-header">
                    <span class="vendor-agent-proposal-field">${fieldName}</span>
                    <span class="vendor-agent-proposal-confidence vendor-agent-proposal-confidence-${confidenceClass}">
                        ${Math.round(confidence * 100)}%
                    </span>
                </div>
                <div class="vendor-agent-proposal-change">
                    <span>${oldVal}</span>
                    <span class="vendor-agent-proposal-arrow">→</span>
                    <span class="vendor-agent-proposal-new">${newVal}</span>
                </div>
            </div>
        `;
    }).join('');
}

function renderConversation(messages) {
    if (messages.length === 0) return;

    const container = document.getElementById('vendor-agent-messages');
    container.innerHTML = messages.map(m => {
        const role = m.role === 'agent' ? 'assistant' : m.role;
        return `
            <div class="copilot-message copilot-message-${role}">
                <div class="copilot-message-content">${escapeHtml(m.content).replace(/\n/g, '<br>')}</div>
            </div>
        `;
    }).join('');

    container.scrollTop = container.scrollHeight;
}

async function sendVendorAgentMessage(event) {
    event.preventDefault();

    const input = document.getElementById('vendor-agent-input');
    const message = input.value.trim();

    if (!message) return;

    // Add user message to chat
    addVendorAgentMessage(message, 'user');
    input.value = '';

    // Show typing indicator
    const typingId = addVendorAgentTypingIndicator();

    try {
        const response = await fetch(`/api/v1/vendor/${vendorPublicId}/agent/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });

        const data = await response.json();
        console.log("DEBUG chat response:", { success: data.success, hasResponse: !!data.response, proposals_created: data.proposals_created, error: data.error });
        console.log("DEBUG chat response.response (first 200):", (data.response || "").substring(0, 200));

        removeVendorAgentTypingIndicator(typingId);

        if (data.success && data.response) {
            addVendorAgentMessage(data.response, 'assistant');
        } else if (data.error) {
            addVendorAgentMessage(`Error: ${data.error}`, 'assistant');
        }

        // Reload proposals if any were created
        if (data.proposals_created > 0) {
            loadVendorAgentContext();
        }

    } catch (error) {
        removeVendorAgentTypingIndicator(typingId);
        addVendorAgentMessage(`Error: ${error.message}`, 'assistant');
    }
}

function addVendorAgentMessage(content, role) {
    const container = document.getElementById('vendor-agent-messages');
    const div = document.createElement('div');
    div.className = `copilot-message copilot-message-${role}`;
    div.innerHTML = `<div class="copilot-message-content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addVendorAgentTypingIndicator() {
    const id = 'agent-typing-' + Date.now();
    const container = document.getElementById('vendor-agent-messages');
    const div = document.createElement('div');
    div.id = id;
    div.className = 'copilot-message copilot-message-assistant copilot-typing';
    div.innerHTML = `
        <div class="copilot-message-content">
            <div class="copilot-typing-status">
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-dot"></span>
                <span class="copilot-typing-text">Analyzing...</span>
            </div>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
}

function removeVendorAgentTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

async function showProposalDetails(proposalPublicId) {
    currentProposalPublicId = proposalPublicId;

    // Find the proposal in our loaded data
    const response = await fetch(`/api/v1/vendor/${vendorPublicId}/agent-context`);
    const data = await response.json();
    const proposal = data.pending_proposals.find(p => String(p.public_id) === currentProposalPublicId);

    if (!proposal) {
        alert('Proposal not found');
        return;
    }

    const field = proposal.fields && proposal.fields[0];
    const oldVal = field?.old_display_value || field?.old_value || '(none)';
    const newVal = field?.new_display_value || field?.new_value || '(none)';
    const fieldName = field?.field_name?.replace(/_/g, ' ') || 'Unknown';

    document.getElementById('vendor-agent-modal-title').textContent = `Proposed Change: ${fieldName}`;

    document.getElementById('vendor-agent-modal-body').innerHTML = `
        <div class="vendor-agent-modal-section">
            <div class="vendor-agent-modal-label">Current Value</div>
            <div class="vendor-agent-modal-value">${escapeHtml(oldVal)}</div>
        </div>
        <div class="vendor-agent-modal-section">
            <div class="vendor-agent-modal-label">Proposed Value</div>
            <div class="vendor-agent-modal-value" style="color: #059669; font-weight: 500;">${escapeHtml(newVal)}</div>
        </div>
        <div class="vendor-agent-modal-section">
            <div class="vendor-agent-modal-label">Confidence</div>
            <div class="vendor-agent-modal-value">${Math.round((proposal.confidence || 0) * 100)}%</div>
        </div>
        <div class="vendor-agent-modal-section">
            <div class="vendor-agent-modal-label">Agent's Reasoning</div>
            <div class="vendor-agent-modal-reasoning">${escapeHtml(proposal.reasoning || 'No reasoning provided')}</div>
        </div>
        <div class="vendor-agent-modal-section" id="rejection-reason-section" style="display: none;">
            <div class="vendor-agent-modal-label">Rejection Reason (Required)</div>
            <textarea id="rejection-reason-input" class="vendor-agent-rejection-input"
                placeholder="Please explain why this proposal is incorrect..."></textarea>
        </div>
    `;

    document.getElementById('vendor-agent-modal-footer').innerHTML = `
        <button type="button" class="btn btn-secondary" onclick="closeVendorAgentModal()">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="showRejectForm()">Reject</button>
        <button type="button" class="btn btn-success" onclick="approveProposal()">Approve</button>
    `;

    document.getElementById('vendor-agent-modal').style.display = 'block';
}

function showRejectForm() {
    document.getElementById('rejection-reason-section').style.display = 'block';
    document.getElementById('vendor-agent-modal-footer').innerHTML = `
        <button type="button" class="btn btn-secondary" onclick="closeVendorAgentModal()">Cancel</button>
        <button type="button" class="btn btn-danger" onclick="rejectProposal()">Confirm Rejection</button>
    `;
    document.getElementById('rejection-reason-input').focus();
}

async function approveProposal() {
    try {
        const response = await fetch(
            `/api/v1/vendor/${vendorPublicId}/agent/proposal/${currentProposalPublicId}/approve`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }
        );

        const data = await response.json();

        if (data.success) {
            closeVendorAgentModal();
            showApplyModal();
        } else {
            alert('Error: ' + (data.error || 'Failed to approve'));
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function showApplyModal() {
    document.getElementById('vendor-agent-modal-title').textContent = 'Proposal Approved';
    document.getElementById('vendor-agent-modal-body').innerHTML = `
        <p>The proposal has been approved. Would you like to apply the changes now?</p>
    `;
    document.getElementById('vendor-agent-modal-footer').innerHTML = `
        <button type="button" class="btn btn-secondary" onclick="closeVendorAgentModal(); loadVendorAgentContext();">Later</button>
        <button type="button" class="btn btn-primary" onclick="applyProposal()">Apply Now</button>
    `;
    document.getElementById('vendor-agent-modal').style.display = 'block';
}

async function applyProposal() {
    try {
        const response = await fetch(
            `/api/v1/vendor/${vendorPublicId}/agent/proposal/${currentProposalPublicId}/apply`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }
        );

        const data = await response.json();

        if (data.success) {
            closeVendorAgentModal();
            // Reload the page to show updated vendor data
            window.location.reload();
        } else {
            alert('Error: ' + (data.error || 'Failed to apply'));
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

async function rejectProposal() {
    const reason = document.getElementById('rejection-reason-input').value.trim();

    if (!reason || reason.length < 10) {
        alert('Please provide a rejection reason (at least 10 characters)');
        return;
    }

    try {
        const response = await fetch(
            `/api/v1/vendor/${vendorPublicId}/agent/proposal/${currentProposalPublicId}/reject`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rejection_reason: reason })
            }
        );

        const data = await response.json();

        if (data.success) {
            closeVendorAgentModal();
            loadVendorAgentContext();
            addVendorAgentMessage(`Proposal rejected. Reason recorded: "${reason}"`, 'assistant');
        } else {
            alert('Error: ' + (data.error || 'Failed to reject'));
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function closeVendorAgentModal() {
    document.getElementById('vendor-agent-modal').style.display = 'none';
    currentProposalPublicId = null;
}

async function clearVendorAgentChat() {
    if (!confirm('Clear conversation history for this vendor? This cannot be undone.')) return;

    try {
        await fetch(`/api/v1/vendor/${vendorPublicId}/agent/conversation`, { method: 'DELETE' });

        document.getElementById('vendor-agent-messages').innerHTML = `
            <div class="copilot-message copilot-message-assistant">
                <div class="copilot-message-content">
                    Conversation cleared. How can I help you with this vendor?
                </div>
            </div>
        `;
    } catch (error) {
        alert('Error clearing conversation: ' + error.message);
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// On vendor view, the floating chat button opens this panel (right-hand sidebar)
window.toggleCopilot = toggleVendorAgentPanel;
</script>
