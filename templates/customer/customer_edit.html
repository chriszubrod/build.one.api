{% extends 'shared/layout/base.html' %}

{% block content %}

    <h1>Edit Customer</h1>

    <span>{{ customer.guid }}</span>

    <form id="customerForm" autocomplete="off" onsubmit="return false;">

        {% include 'customer/_form.html' %}

        <button type="submitButton" id="submitButton" >Submit</button>

    </form>

{% endblock %}

<script src="{{ url_for('static', filename='js/form-handler.js') }}" defer></script>

<script defer>
    document.addEventListener('DOMContentLoaded', function() {
        FormHandler.init('customerForm', '/api/put/customer', 'PUT');
    });
</script>
