{% extends 'shared/layout/base.html' %}

{% block content %}

    {% for contact in contacts %}

        <div>
            <div>
                <span>{{ contact.guid }}</span>
                <span>{{ contact.first_name }}</span>
                <span>{{ contact.last_name }}</span>
                <span>{{ contact.email }}</span>
                <span>{{ contact.phone }}</span>
            </div>
        </div>

    {% endfor %}

{% endblock %}
