<div class="flex flex-col space-y-2">
    {% if ms_drives_items %}
        {% for drive_item in ms_drives_items %}
            <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
                <!-- Drive Item Name -->
                <p class="text-sm text-gray-500">
                    Unknown:
                    <a href="#" 
                        onclick="loadDriveItemsChildren('{{ drive_id }}', '{{ drive_item.drive_item_id }}', '{{ drive_item.name }}'); return false;"
                        class="text-blue-600 hover:text-blue-800">
                        {{ drive_item.name }}
                    </a>
                </p>
                <!-- Drive Item Type -->
                <p class="text-sm text-gray-500">
                    {{ drive_item.drive_item_type }}
                </p>
                <button onclick="selectItem({
                    type: 'drive_item',
                    drive_id: '{{ drive_id }}',
                    item_id: '{{ drive_item.drive_item_id }}',
                    name: '{{ drive_item.name }}'
                }); return false;"
                class="mt-2 text-sm text-green-600 hover:text-green-800">
                    Select Item
                </button>
            </div>
        {% endfor %}
    {% else %}
        <p class="text-gray-600">No drives found.</p>
    {% endif %}
</div>
