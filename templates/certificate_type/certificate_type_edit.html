{% extends 'shared/layout/base.html' %}
{% block title %}Certificate Type{% endblock %}
{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Edit Certificate Type</h1>
      <a href="{{ url_for('web_certificate_type.list_certificate_types_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Back to Certificate Types</a>
    </div>
    <form id="edit-certificate-type-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <input type="hidden" id="guid" name="guid" value="{{ certificate_type.guid }}">
      <div class="grid grid-cols-1 gap-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-3 py-2">Name</label>
          <input type="text" id="name" name="name" value="{{ certificate_type.name }}" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
        </div>
      </div>
      <div class="flex items-center justify-between border-b border-gray-100 py-2">
        <button type="submit" class="mt-2 mb-2 px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('edit-certificate-type-form');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const guid = document.getElementById('guid').value.trim();
    const name = document.getElementById('name').value.trim();
    if (!guid || !name) { alert('Please complete all fields.'); return; }
    try {
      const resp = await fetch('{{ url_for("api_certificate_type.api_patch_certificate_type_route") }}', {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guid, name })
      });
      const result = await resp.json();
      if (result.success) { window.location.href = '{{ url_for("web_certificate_type.list_certificate_types_route") }}'; }
      else { alert(result.message || 'Update failed'); }
    } catch (err) { alert(err.message); }
  });
});
</script>
{% endblock %}
