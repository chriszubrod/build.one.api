<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Build.One</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}?v={{ range(1000, 9999) | random }}">
</head>
<body>
    <div class="page-container">
        <section class="auth-logo">
            <div>
                <span aria-hidden="true">b1</span>
                <span>Build.One</span>
            </div>
            <div>
                <span>For Contractors</span>
            </div>
        </section>

        <section class="auth-panel">
            <header>
                <div>
                    <a href="/auth/login">Log in</a>
                </div>
            </header>

            <main aria-labelledby="signup-title">
                <div>
                    <h1 id="signup-title">Create your account</h1>
                    <p>Bring your teams into Build.One. Organize modules, manage cost codes, and ship faster together.</p>
                </div>

                <form id="signupForm" novalidate>
                    <div>
                        <label for="username">Username</label>
                        <input type="text"
                               id="username"
                               name="username"
                               placeholder="Choose a username"
                               maxlength="50"
                               required>
                    </div>

                    <div>
                        <label for="password">Password</label>
                        <input type="password"
                               id="password"
                               name="password"
                               placeholder="Create a password"
                               maxlength="255"
                               required>
                    </div>

                    <div>
                        <label for="confirmPassword">Confirm password</label>
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               placeholder="Re-enter password"
                               maxlength="255"
                               required>
                    </div>

                    <button type="submit" id="signupSubmit" disabled>
                        Create account
                    </button>
                </form>
            </main>

            <footer>
                <!--<a href="/support">Support</a>-->
                <!--<a href="/privacy">Privacy</a>-->
                <!--<a href="/terms">Terms</a>-->
            </footer>
        </section>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupSubmit = document.getElementById('signupSubmit');

        const confirmPasswordField = signupForm.confirmPassword;

        const toggleSignupButtonState = () => {
            const usernameFilled = signupForm.username.value.trim().length > 0;
            const password = signupForm.password.value.trim();
            const confirmPassword = signupForm.confirmPassword.value.trim();
            const passwordsMatch = password.length > 0 && password === confirmPassword;

            if (!passwordsMatch && confirmPassword.length > 0) {
                confirmPasswordField.setCustomValidity('Passwords do not match');
            } else {
                confirmPasswordField.setCustomValidity('');
            }

            signupSubmit.disabled = !(usernameFilled && passwordsMatch);
        };

        signupForm.addEventListener('input', toggleSignupButtonState);
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            toggleSignupButtonState();
            if (signupSubmit.disabled) {
                return;
            }

            const formData = new FormData(this);
            const data = {
                username: formData.get('username'),
                password: formData.get('password'),
                confirm_password: formData.get('confirmPassword'),
            };

            try {
                const response = await fetch('/api/v1/signup/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.clear();
                    localStorage.setItem('token.access_token', result.token.access_token);
                    localStorage.setItem('auth.public_id', result.auth.public_id);
                    localStorage.setItem('auth.username', result.auth.username);
                    document.cookie = `token.access_token=${result.token.access_token}; path=/; max-age=${result.token.expires_in}; samesite=lax`;
                    window.location.href = '/user/create';
                } else {
                    const error = await response.json();
                    alert('Unable to create account: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Unable to create account: ' + error.message);
            }
        });

        toggleSignupButtonState();
    </script>
</body>
</html>
