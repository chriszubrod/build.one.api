<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Role Module - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel, .btn-delete {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-sitemap me-2"></i>Edit Role Module
                    </h1>
                    <a href="/role_module/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-layer-group me-2"></i>Role Module Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="editRoleModuleForm">
                                <input type="hidden" id="public_id" name="public_id" value="{{ role_module.public_id }}">
                                <input type="hidden" id="row_version" name="row_version" value="{{ role_module.row_version }}">

                                <div class="mb-3">
                                    <label for="role_id" class="form-label">
                                        Role <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="role_id" name="role_id" required>
                                        <option value="">Select Role</option>
                                        {% for role in roles %}
                                        <option value="{{ role.id }}" {% if role.id == role_module.role_id %}selected{% endif %}>{{ role.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="module_id" class="form-label">
                                        Module <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-control" id="module_id" name="module_id" required>
                                        <option value="">Select Module</option>
                                        {% for module in modules %}
                                        <option value="{{ module.id }}" {% if module.id == role_module.module_id %}selected{% endif %}>{{ module.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <div>
                                        <button type="button" class="btn btn-danger btn-delete" onclick="deleteRoleModule()">
                                            <i class="fas fa-trash me-1"></i>Delete
                                        </button>
                                    </div>
                                    <div>
                                        <a href="/role_module/list" class="btn btn-secondary btn-cancel">
                                            <i class="fas fa-times me-1"></i>Cancel
                                        </a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-save me-1"></i>Update Role Module
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('editRoleModuleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = {
                role_id: formData.get('role_id'),
                module_id: formData.get('module_id'),
                row_version: formData.get('row_version')
            };

            try {
                const response = await fetch(`/api/v1/update/role_module/${formData.get('public_id')}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = '/role_module/list';
                } else {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const error = await response.json();
                        let message = 'Unknown error';
                        if (error.detail) {
                            message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                        } else if (error.message) {
                            message = error.message;
                        } else if (typeof error === 'string') {
                            message = error;
                        } else {
                            message = JSON.stringify(error);
                        }
                        alert('Error updating role module: ' + message);
                    } else {
                        const errorText = await response.text();
                        alert('Error updating role module: ' + errorText);
                    }
                }
            } catch (error) {
                alert('Error updating role module: ' + error.message);
            }
        });

        async function deleteRoleModule() {
            if (confirm('Are you sure you want to delete this role module? This action cannot be undone.')) {
                const formData = new FormData(document.getElementById('editRoleModuleForm'));

                try {
                    const response = await fetch(`/api/v1/delete/role_module/${formData.get('public_id')}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ row_version: formData.get('row_version') })
                    });

                    if (response.ok) {
                        window.location.href = '/role_module/list';
                    } else {
                        const contentType = response.headers.get('content-type');
                        if (contentType && contentType.includes('application/json')) {
                            const error = await response.json();
                            let message = 'Unknown error';
                            if (error.detail) {
                                message = Array.isArray(error.detail) ? error.detail.join(', ') : error.detail;
                            } else if (error.message) {
                                message = error.message;
                            } else if (typeof error === 'string') {
                                message = error;
                            } else {
                                message = JSON.stringify(error);
                            }
                            alert('Error deleting role module: ' + message);
                        } else {
                            const errorText = await response.text();
                            alert('Error deleting role module: ' + errorText);
                        }
                    }
                } catch (error) {
                    alert('Error deleting role module: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
