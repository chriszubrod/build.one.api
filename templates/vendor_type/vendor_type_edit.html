{% extends 'shared/layout/base.html' %}

{% block title %}Vendor Type{% endblock %}

{% block content %}

    <!-- Container for the page content -->
    <div class="flex-1 p-4">
        <!-- Header section with title and form -->
        <div class="space-y-2">

            <div class="flex justify-between items-center">

                <h1 class="'px-3 py-2'">
                    Edit Vendor Type
                </h1>

                <a href="{{ url_for('web_vendor_type.list_vendor_types_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">
                    Back to Vendor Types
                </a>
                
            </div>

            <form id="edit-vendor-type-form" class="w-full" autocomplete="off">

                <input type="hidden" id="guid" name="guid" value="{{ vendor_type.guid }}">

                <label for="name" class="block text-sm font-medium text-gray-700 px-3 py-2">
                    Name
                </label>

                <input type="text" id="name" name="name" value="{{ vendor_type.name }}" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">

                <button type="submit" class="mt-4 px-4 py-2 bg-black text-white rounded hover:bg-gray-800 px-3 py-2">
                    Save
                </button>

            </form>

        </div>

    </div>

    <script>
        const form = document.getElementById('edit-vendor-type-form');
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // form id, endpoint, {method, redirect url}
            FormHandler.submitForm(
                'edit-vendor-type-form',
                '{{ url_for("api_vendor_type.api_patch_vendor_type_route") }}',
                {
                    method: 'PATCH',
                    redirectUrl: '{{ url_for("web_vendor_type.list_vendor_types_route") }}'
                }
            );
        });

    </script>

{% endblock %}
