<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="relative z-10 max-w-2xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col gap-6" id="form-container">
        <div class="absolute right-8 top-8">
            <button onclick="window.location.href='/contacts'" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-md">
                Back to Contact List
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4">Create Contact</h1>
        <form id="contact-create-form" class="space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <label for="firstname" class="block font-semibold mb-1">First Name</label>
                <input type="text" id="firstname" name="firstname" class="border p-2 rounded w-full" required>

                <label for="lastname" class="block font-semibold mb-1">Last Name</label>
                <input type="text" id="lastname" name="lastname" class="border p-2 rounded w-full" required>

                <label for="email" class="block font-semibold mb-1">Email</label>
                <input type="email" id="email" name="email" class="border p-2 rounded w-full" required>

                <label for="phone" class="block font-semibold mb-1">Phone</label>
                <input type="text" id="phone" name="phone" class="border p-2 rounded w-full">
            </div>
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Create Contact</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('contact-create-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                const jsonData = {};
                form.querySelectorAll('input, select, textarea').forEach(input => {
                    if (input.type === 'checkbox') {
                        jsonData[input.name] = input.checked;
                    } else {
                        jsonData[input.name] = input.value;
                    }
                });
                try {
                    const response = await fetch('/api/post/contact', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    });
                    const result = await response.json();
                    if (response.ok && result.success) {
                        alert('Contact created successfully!');
                        window.location.href = '/contacts';
                    } else {
                        alert('Error: ' + (result.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error creating contact: ' + error.message);
                }
            });
        }
    </script>
</body>
</html>
