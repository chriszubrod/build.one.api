{% extends 'shared/layout/base.html' %}

{% block title %}Projects{% endblock %}

{% block content %}
    <div class="flex flex-col h-full p-4">
        <div class="flex justify-between items-center mb-2">
            <h1 class="px-3 py-2">Projects</h1>
            <a href="{{ url_for('web_project.create_project_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">+ Create New</a>
        </div>

        <div class="bg-white border border-gray-200 overflow-hidden flex flex-col h-full">
            <div class="grid grid-cols-2 bg-gray-100 border-b border-gray-200">
                <div class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</div>
                <div class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</div>
            </div>
            <div class="overflow-y-auto flex flex-col h-full scrollbar-hide" style="scrollbar-width: none; -ms-overflow-style: none;">
                {% if projects %}
                    {% for project in projects %}
                        <div class="grid grid-cols-2 border-b border-gray-200 hover:bg-gray-50 transition-colors duration-150">
                            <div class="px-6 py-4 whitespace-nowrap">{{ project.name }}</div>
                            <div class="px-6 py-4 whitespace-nowrap">
                                <a href="{{ url_for('web_project.view_project_route', project_guid=project.guid) }}" class="text-blue-600 hover:text-blue-800 text-sm">View</a>
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="px-6 py-4 text-center text-gray-500">No projects found.</div>
                {% endif %}
            </div>
        </div>
    </div>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
{% endblock %}
