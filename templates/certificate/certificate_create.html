{% extends 'shared/layout/base.html' %}

{% block title %}Certificate{% endblock %}

{% block content %}

    <div class="flex-1 p-4 flex flex-col">

        <div class="space-y-2 flex-1">

            <div class="flex justify-between items-center">

                <h1 class="px-3 py-2">
                    Create Certificate
                </h1>

                <a href="{{ url_for('web_certificate.list_certificates_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">
                    Back to Certificates
                </a>

            </div>

            <form id="create-coi-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">

                <div class="grid grid-cols-2 gap-4">

                    <div>
                        <label for="vendor" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Vendor
                        </label>
                        <select id="vendor" name="vendor" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
                            <option value="">Select Vendor</option>
                            {% if vendors %}
                                {% for vendor in vendors %}
                                    <option value="{{ vendor.guid }}">{{ vendor.name }}</option>
                                {% endfor %}
                            {% else %}
                                <option disabled>Vendors did not populate.</option>
                            {% endif %}
                        </select>
                    </div>

                    <div>
                        <label for="certificate-type" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Type Of Certificate
                        </label>
                        <select id="certificate-type" name="certificate-type" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
                            <option value="">Select Type Of Certificate</option>
                            {% if certificate_types %}
                                {% for ct in certificate_types %}
                                    <option value="{{ ct.guid }}">{{ ct.name }}</option>
                                {% endfor %}
                            {% else %}
                                <option disabled>Types of certificates did not populate.</option>
                            {% endif %}
                        </select>
                    </div>

                    <div>
                        <label for="certificate-number" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Certificate Number
                        </label>
                        <input type="text" id="certificate-number" name="certificate-number" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="certificate-eff-date" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Certificate Effective Date
                        </label>
                        <input type="date" id="certificate-eff-date" name="certificate-eff-date" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="certificate-exp-date" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Certificate Expiration Date
                        </label>
                        <input type="date" id="certificate-exp-date" name="certificate-exp-date" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="certificate-attachment" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Certificate Attachment
                        </label>
                        <input type="number" id="certificate-attachment" name="certificate-attachment" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                </div>

                <div class="flex items-center justify-between border-b border-gray-100 py-2">

                    <button type="submit" class="mt-2 mb-2 px-4 py-2 bg-black text-white rounded hover:bg-gray-800">
                        Submit
                    </button>

                </div>

            </form>

        </div>

    </div>

{% endblock %}

{% block extra_css %}
<style>
    #create-certificate-form::-webkit-scrollbar { display: none; }
    #create-certificate-form { scrollbar-width: none; -ms-overflow-style: none; }
    .overflow-y-auto::-webkit-scrollbar { display: none; }
    .overflow-y-auto { scrollbar-width: none; -ms-overflow-style: none; }
</style>
{% endblock %}

{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('create-certificate-form');
    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const vendorGuid = document.getElementById('vendor').value;
        const certificateTypeGuid = document.getElementById('certificate-type').value;
        const certificateNumber = document.getElementById('certificate-number').value.trim();
        const certificateEffDate = document.getElementById('certificate-eff-date').value;
        const certificateExpDate = document.getElementById('certificate-exp-date').value;
        const certificateAttachmentGuid = document.getElementById('certificate-attachment').value;

        if (!vendorGuid || !certificateTypeGuid || !certificateNumber || !certificateEffDate || !certificateExpDate || !certificateAttachmentGuid) {
            alert('Please complete all fields.');
            return;
        }

        const payload = {
            vendorGuid: vendorGuid,
            certificateTypeGuid: certificateTypeGuid,
            policyNumber: certificateNumber,
            policyEffDate: certificateEffDate,
            policyExpDate: certificateExpDate,
            certificateAttachmentGuid: certificateAttachmentGuid
        };

        try {
            const resp = await fetch('{{ url_for("api_certificate.api_post_certificate_route") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`HTTP ${resp.status}: ${text}`);
            }
            const result = await resp.json();
            if (result.success) {
                alert('Certificate created successfully.');
                window.location.href = '{{ url_for("web_certificate.list_certificates_route") }}';
            } else {
                alert(result.message || 'Create failed');
            }
        } catch (err) {
            console.error(err);
            alert(`Error: ${err.message}`);
        }
    });
});
</script>
{% endblock %}
