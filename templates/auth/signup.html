<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="row bg-secondary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-plus me-2"></i>Signup
                    </h1>
                    <a href="/auth/login" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-tags me-2"></i>Signup
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="signupForm">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        Username <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="username"
                                           name="username"
                                           required
                                           maxlength="50"
                                           placeholder="Enter username">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        Password <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="password"
                                           name="password"
                                           required
                                           maxlength="255"
                                           placeholder="Enter password">
                                    <div class="form-text">Required field. Maximum 255 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        Confirm Password <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="confirmPassword"
                                           name="confirmPassword"
                                           required
                                           maxlength="255"
                                           placeholder="Enter confirm password">
                                    <div class="form-text">Required field. Maximum 255 characters.</div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/auth/signup" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-secondary">
                                        <i class="fas fa-save me-1"></i>Signup
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = {
                username: formData.get('username'),
                password: formData.get('password'),
                confirm_password: formData.get('confirmPassword'),
            };

            try {
                const response = await fetch('/api/v1/signup/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/auth/login';
                } else {
                    const error = await response.json();
                    console.log(error);
                    alert('Error creating auth: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating auth: ' + error.message);
            }
        });
    </script>
</body>
</html>
