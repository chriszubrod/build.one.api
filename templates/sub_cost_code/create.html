<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Sub Cost Code - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 640px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="row bg-dark text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-plus me-2"></i>Create Sub Cost Code
                    </h1>
                    <a href="/sub-cost-code/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-layer-group me-2"></i>Sub Cost Code Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createSubCostCodeForm">

                                <div class="mb-3">
                                    <label for="number" class="form-label">
                                        Sub Cost Code Number <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="number"
                                           name="number"
                                           required
                                           maxlength="50"
                                           placeholder="Enter number">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="name" class="form-label">
                                        Name <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="name"
                                           name="name"
                                           required
                                           maxlength="255"
                                           placeholder="Enter name">
                                    <div class="form-text">Required field. Maximum 255 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">
                                        Description
                                    </label>
                                    <textarea class="form-control"
                                              id="description"
                                              name="description"
                                              rows="3"
                                              maxlength="255"
                                              placeholder="Provide a description"></textarea>
                                    <div class="form-text">Optional. Maximum 255 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="cost_code_id" class="form-label">
                                        Parent Cost Code <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select"
                                            id="cost_code_id"
                                            name="cost_code_id"
                                            required>
                                        {% for cost_code in cost_codes %}
                                            <option value="{{ cost_code.id }}">{{ cost_code.name }}</option>
                                        {% endfor %}
                                    </select>
                                    <div class="form-text">Required field. Select the parent cost code.</div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/sub-cost-code/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-dark">
                                        <i class="fas fa-save me-1"></i>Create Sub Cost Code
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createSubCostCodeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = {
                number: formData.get('number'),
                name: formData.get('name'),
                description: formData.get('description') || null,
                cost_code_id: formData.get('cost_code_id')
            };

            try {
                const response = await fetch('/api/v1/create/sub-cost-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    await response.json();
                    window.location.href = '/sub-cost-code/list';
                } else {
                    const error = await response.json();
                    alert('Error creating sub cost code: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating sub cost code: ' + error.message);
            }
        });
    </script>
</body>
</html>
