{% extends 'shared/layout/base.html' %}

{% block content %}

    {% for cost_code in cost_codes %}

        <div>
            <div>
                <span>{{ cost_code.guid }}</span>
                <span>{{ cost_code.number }}</span>
                <span>{{ cost_code.name }}</span>
                <span>{{ cost_code.desc }}</span>
            </div>
        </div>

    {% endfor %}

{% endblock %}
