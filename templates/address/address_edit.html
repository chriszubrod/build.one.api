<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Address</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="relative z-10 max-w-3xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col gap-6" id="form-container">
        <div class="absolute right-8 top-8">
            <button onclick="window.location.href='/addresses'" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-md">
                Back to Address List
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4">Edit Address</h1>
        {% if address %}
        <form id="address-edit-form" class="space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <label for="streetOne" class="block font-semibold mb-1">Street One</label>
                <input type="text" id="streetOne" name="streetOne" class="border p-2 rounded w-full" required value="{{ address.street_one }}">

                <label for="streetTwo" class="block font-semibold mb-1">Street Two</label>
                <input type="text" id="streetTwo" name="streetTwo" class="border p-2 rounded w-full" value="{{ address.street_two }}">

                <label for="city" class="block font-semibold mb-1">City</label>
                <input type="text" id="city" name="city" class="border p-2 rounded w-full" required value="{{ address.city }}">

                <label for="state" class="block font-semibold mb-1">State</label>
                <input type="text" id="state" name="state" class="border p-2 rounded w-full" required value="{{ address.state }}">

                <label for="zipCode" class="block font-semibold mb-1">Zip Code</label>
                <input type="text" id="zipCode" name="zipCode" class="border p-2 rounded w-full" required value="{{ address.zip_code }}">
            </div>
            <button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Update Address</button>
        </form>
        {% else %}
        <div class="text-red-600 font-semibold">Address not found.</div>
        {% endif %}
    </div>
    <script>
        const form = document.getElementById('address-edit-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                const jsonData = {};
                form.querySelectorAll('input, select, textarea').forEach(input => {
                    if (input.type === 'checkbox') {
                        jsonData[input.name] = input.checked;
                    } else {
                        jsonData[input.name] = input.value;
                    }
                });
                jsonData['guid'] = "{{ address.guid }}";
                try {
                    const response = await fetch('/api/patch/address', {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    });
                    const result = await response.json();
                    if (response.ok && result.success) {
                        alert('Address updated successfully!');
                        window.location.href = '/addresses';
                    } else {
                        alert('Error: ' + (result.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error updating address: ' + error.message);
                }
            });
        }
    </script>
</body>
</html>
