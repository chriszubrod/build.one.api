<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AP Agent Upload</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            html, body { min-height: 100vh; margin: 0; }
            #drop-area.dragover { background-color: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
        </style>
    </head>
    <body class="bg-gray-50">
        <div id="drop-area" class="absolute inset-0 border-4 border-dashed border-gray-300 flex flex-col items-center justify-center text-gray-500 text-center p-6 transition-all duration-200 hidden">
            <p class="text-lg">Drag & drop a PDF invoice here or click to upload</p>
            <input id="file-input" type="file" accept="application/pdf" class="hidden">
        </div>

        <div class="relative z-10 max-w-6xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col md:flex-row gap-6" id="form-container">
            <div class="flex-1 space-y-6">
                <form id="invoice-form" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <input name="vendor" placeholder="Vendor" readonly class="border p-2 rounded w-full">
                        <input name="invoice_number" placeholder="Invoice Number" readonly class="border p-2 rounded w-full">
                        <input type="date" name="invoice_date" readonly class="border p-2 rounded w-full">
                        <input name="total_amount" placeholder="Total Amount" type="text" inputmode="decimal" readonly class="border p-2 rounded w-full">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <p class="font-semibold">Line Items</p>
                            <button type="button" onclick="addLineItem()" class="text-blue-600 text-sm">+ Add Item</button>
                        </div>
                        <div id="line-items" class="space-y-2">
                            <div class="grid grid-cols-12 gap-2">
                                <input name="cost_code[]" placeholder="Cost Code" readonly class="border p-2 rounded col-span-2">
                                <input name="description[]" placeholder="Description" readonly class="border p-2 rounded col-span-4">
                                <input name="line_amount[]" placeholder="Amount" readonly class="border p-2 rounded col-span-2">
                                <label class="flex flex-col items-center col-span-1 text-sm">
                                    <span class="mb-1">Billable</span>
                                    <input type="checkbox" name="billable[]" readonly checked class="mt-1">
                                </label>
                                <input name="project[]" placeholder="Project" readonly class="border p-2 rounded col-span-2">
                            </div>
                        </div>
                    </div>

                    <div id="preview" class="mb-6">
                        <div class="flex justify-between items-center">
                            <p class="font-semibold">Uploaded File:</p>
                            <button type="button" onclick="clearFile()" class="text-red-600 text-sm underline">Remove File</button>
                        </div>
                        <p id="file-name" class="text-sm text-gray-700"></p>
                        <iframe id="pdf-viewer" class="w-full aspect-[8.5/11] border rounded mt-2" type="application/pdf"></iframe>
                    </div>

                    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Submit Invoice</button>
                </form>
            </div>

            <div class="w-full md:w-1/3 flex flex-col">
                <div class="border rounded p-3 bg-gray-50 flex-1 flex flex-col">
                    <p class="font-semibold mb-2">Chat</p>
                    <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 text-sm bg-white p-2 border rounded break-words whitespace-pre-wrap"></div>
                    <div class="mt-2 flex items-center gap-2">
                        <textarea id="chat-input" placeholder="Type a message..." class="flex-1 border p-2 rounded resize-none overflow-hidden" rows="1"></textarea>
                        <button type="button" onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded">Send</button>
                        <button type="button" onclick="document.getElementById('chat-file').click()" class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 text-gray-700">
                            <span class="text-xl leading-none">+</span>
                        </button>
                        <input id="chat-file" type="file" accept="application/pdf" class="hidden" onchange="handleFile(this.files[0])">
                    </div>
                </div>
            </div>
        </div>

        <script>
            const dropArea = document.getElementById('drop-area');
            const fileInput = document.getElementById('file-input');
            const formContainer = document.getElementById('form-container');
            const fileNameEl = document.getElementById('file-name');
            const pdfViewer = document.getElementById('pdf-viewer');

            function clearFile() {
                fileInput.value = null;
                fileNameEl.textContent = '';
                pdfViewer.src = '';
                formContainer.classList.add('hidden');
                dropArea.classList.remove('hidden');
            }

            dropArea.addEventListener('click', () => fileInput.click());

            ['dragenter', 'dragover'].forEach(event => {
                window.addEventListener(event, e => {
                    e.preventDefault();
                    dropArea.classList.remove('hidden');
                    formContainer.classList.add('hidden');
                    dropArea.classList.add('dragover');
                });
            });

            ['dragleave', 'drop'].forEach(event => {
                dropArea.addEventListener(event, e => {
                    e.preventDefault();
                    dropArea.classList.remove('dragover');
                });
            });

            dropArea.addEventListener('drop', e => {
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') handleFile(file);
            });

            fileInput.addEventListener('change', e => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') handleFile(file);
            });

            function handleFile(file) {
                fileNameEl.textContent = file.name;
                pdfViewer.src = URL.createObjectURL(file);
                dropArea.classList.add('hidden');
                formContainer.classList.remove('hidden');
            }

            function addLineItem() {
                const container = document.createElement('div');
                container.className = 'grid grid-cols-12 gap-2';
                container.innerHTML = `
                    <input name="cost_code[]" placeholder="Cost Code" readonly class="border p-2 rounded col-span-2">
                    <input name="description[]" placeholder="Description" readonly class="border p-2 rounded col-span-4">
                    <input name="line_amount[]" placeholder="Amount" readonly class="border p-2 rounded col-span-2">
                    <label class="flex flex-col items-center col-span-1 text-sm">
                    <span class="mb-1">Billable</span>
                    <input type="checkbox" name="billable[]" readonly class="mt-1">
                    </label>
                    <input name="project[]" placeholder="Project" readonly class="border p-2 rounded col-span-2">
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-600 text-xs underline col-span-1 self-center">Remove</button>
                `;
                document.getElementById('line-items').appendChild(container);
            }

            function sendMessage() {
                const input = document.getElementById('chat-input');
                const msg = input.value.trim();
                if (!msg) return;
                const chatBox = document.getElementById('chat-box');
                const bubble = document.createElement('div');
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                bubble.innerHTML = `<div class='flex justify-between text-xs text-gray-400 mb-1'><span>You</span><span>${time}</span></div><div>${msg}</div>`;
                bubble.className = 'bg-blue-100 p-2 rounded self-end text-right';
                chatBox.appendChild(bubble);
                input.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;

                if (msg.toLowerCase().includes("vendor")) {
                    document.querySelector('input[name="vendor"]').value = "ACME Supplies";
                    const confirmBubble = document.createElement('div');
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    confirmBubble.innerHTML = `<div class='flex justify-between text-xs text-gray-400 mb-1'><span>Agent</span><span>${time}</span></div><div>✅ Vendor set to: ACME Supplies</div>`;
                    confirmBubble.className = 'bg-green-100 p-2 rounded self-start text-left';
                    chatBox.appendChild(confirmBubble);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                if (msg.toLowerCase().includes("invoice number")) {
                    document.querySelector('input[name="invoice_number"]').value = "INV-2024-01";
                    const confirmBubble = document.createElement('div');
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    confirmBubble.innerHTML = `<div class='flex justify-between text-xs text-gray-400 mb-1'><span>Agent</span><span>${time}</span></div><div>✅ Invoice Number set to: INV-2024-01</div>`;
                    confirmBubble.className = 'bg-green-100 p-2 rounded self-start text-left';
                    chatBox.appendChild(confirmBubble);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                if (msg.toLowerCase().includes("date")) {
                    document.querySelector('input[name="invoice_date"]').value = "2024-04-04";
                    const confirmBubble = document.createElement('div');
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    confirmBubble.innerHTML = `<div class='flex justify-between text-xs text-gray-400 mb-1'><span>Agent</span><span>${time}</span></div><div>✅ Invoice Date set to: 2024-04-04</div>`;
                    confirmBubble.className = 'bg-green-100 p-2 rounded self-start text-left';
                    chatBox.appendChild(confirmBubble);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }

            function formatCurrency(input) {
                const cleaned = input.value.replace(/[^0-9.-]+/g, '');
                const value = parseFloat(cleaned);
                if (!isNaN(value)) {
                    input.value = `$${value.toFixed(2)}`;
                }
            }

            function updateTotalAmount() {
                const amountInputs = document.querySelectorAll('input[name="line_amount[]"]');
                let total = 0;
                amountInputs.forEach(input => {
                    const cleaned = input.value.replace(/[^0-9.-]+/g, '');
                    const value = parseFloat(cleaned);
                    if (!isNaN(value)) total += value;
                });
                document.querySelector('input[name="total_amount"]').value = `$${total.toFixed(2)}`;
            }

            document.addEventListener('input', function (e) {
                if (e.target && e.target.name === 'line_amount[]') {
                    updateTotalAmount();
                }
            });

            const chatInput = document.getElementById('chat-input');

            chatInput.addEventListener('input', function () {
                chatInput.style.height = 'auto';
                chatInput.style.height = chatInput.scrollHeight + 'px';
            });

            chatInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            document.addEventListener('click', function (e) {
                if (e.target && e.target.name === 'line_amount[]') {
                    formatCurrency(e.target);
                }
                if (e.target && e.target.tagName === 'BUTTON' && e.target.textContent === 'Remove') {
                    setTimeout(updateTotalAmount, 0);
                }
            });
        </script>
    </body>
</html>
