<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Companies</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            html, body { min-height: 100vh; margin: 0; }
            #drop-area.dragover { background-color: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
            input[type="file"] {
                display: none;
            }
        </style>
        
    </head>
    <body class="bg-gray-50">
        {% include 'shared/components/header_view.html' %}
        <!-- Container -->
        <div class="container mx-auto px-4 py-8">

            <!-- Create New Company Button -->
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Companies</h1>
                <a href="/company/create" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Create New Company
                </a>
            </div>

            <!-- Company Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Name
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="company-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Companies will be populated here -->
                        {% if companies %}
                            {% for company in companies %}
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                        {{ company.name }}
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <a href="/company/{{ company.guid }}" class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">View</a>
                                    </td>
                                </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td class="px-6 py-4 text-gray-500" colspan="2">No company found.</td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>

        </div>
        {% include 'shared/components/footer_view.html' %}
    </body>
</html>
