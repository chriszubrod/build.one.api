{% extends 'shared/layout/base.html' %}

{% block title %}Edit Customer{% endblock %}

{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Edit Customer</h1>
      <a href="{{ url_for('web_customer.view_customer_route', customer_guid=customer.guid) }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Cancel</a>
    </div>

    <form id="edit-customer-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <div class="space-y-4 bg-white border border-gray-200 p-4">
        <div>
          <label for="guid" class="block text-sm font-medium text-gray-700 px-1 py-1">GUID</label>
          <input type="text" id="guid" name="guid" value="{{ customer.guid }}" readonly class="block w-full rounded-md border-2 border-gray-200 bg-gray-50 shadow-sm px-3 py-2 text-gray-900" />
        </div>
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-1 py-1">Name</label>
          <input type="text" id="name" name="name" value="{{ customer.name }}" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>
        <div class="flex items-center space-x-2">
          <input type="checkbox" id="isActive" name="isActive" class="h-4 w-4" {% if customer.is_active %}checked{% endif %}>
          <label for="isActive" class="text-sm font-medium text-gray-700">Active</label>
        </div>
      </div>

      <div class="mt-2 mb-2 px-4 py-2">
        <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Update</button>
      </div>
    </form>

    <div class="mt-4 bg-white border border-gray-200 p-4">
      <h2 class="text-base font-semibold text-gray-800 mb-2">Link to Intuit Customer</h2>
      <p class="text-sm text-gray-600 mb-3">Choose a QuickBooks customer from the dropdown to create a link.</p>

      <div class="flex items-center space-x-2">
        <select id="intuitCustomerSelect" class="block w-80 rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
          <option value="">Select an Intuit customer</option>
          {% if intuit_customers %}
            {% for ic in intuit_customers %}
              <option value="{{ ic.guid }}" data-id="{{ ic.id }}" {% if mapped_intuit_customer and mapped_intuit_customer.guid == ic.guid %}selected{% endif %}>{{ ic.display_name }}</option>
            {% endfor %}
          {% endif %}
          {% if mapped_intuit_customer %}
            <!-- Add the mapped customer if it's not in the available list -->
            <option value="{{ mapped_intuit_customer.guid }}" data-id="{{ mapped_intuit_customer.id }}" selected>{{ mapped_intuit_customer.display_name }} (Currently Mapped)</option>
          {% endif %}
        </select>
        <button id="mapIntuitBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50" {% if not intuit_customers %}disabled{% endif %}>
          {% if mapped_intuit_customer %}Update Mapping{% else %}Map Customer{% endif %}
        </button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Customer Update Form Handler
  const editForm = document.getElementById('edit-customer-form');
  editForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Get form data
    const guid = document.getElementById('guid').value.trim();
    const name = document.getElementById('name').value.trim();
    const isActive = document.getElementById('isActive').checked;
    
    // Validate required fields
    if (!name) {
      alert('Please provide a customer name.');
      return;
    }
    
    try {
      // Get CSRF token
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      
      // Prepare request data
      const requestData = {
        name: name,
        isActive: isActive ? 1 : 0
      };
      
      // Make API call
      const response = await fetch(`{{ url_for('api_customer.api_patch_customer_route', guid='__GUID__') }}`.replace('__GUID__', guid), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(requestData)
      });
      
      // Handle response
      const result = await response.json();
      
      if (response.ok && result.success) {
        alert('Customer updated successfully!');
        window.location.href = `{{ url_for('web_customer.view_customer_route', customer_guid='__GUID__') }}`.replace('__GUID__', guid);
      } else {
        alert(result.message || `Update failed (HTTP ${response.status})`);
      }
    } catch (error) {
      console.error('Update error:', error);
      alert(`Error: ${error.message}`);
    }
  });

  // Intuit Customer Mapping Handler
  const mapButton = document.getElementById('mapIntuitBtn');
  const intuitSelect = document.getElementById('intuitCustomerSelect');
  
  mapButton.addEventListener('click', async function() {
    const customerGuid = document.getElementById('guid').value.trim();
    const intuitCustomerGuid = intuitSelect.value;

    if (!intuitCustomerGuid) {
      alert('Please select an Intuit customer.');
      return;
    }
    
    try {
      // Get CSRF token
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      
      // Prepare request data
      const requestData = {
        customerGuid: customerGuid,
        intuitCustomerGuid: intuitCustomerGuid
      };
      
      // Make API call
      const response = await fetch('/api/post/map/customer-intuit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(requestData)
      });
      
      // Handle response
      const result = await response.json();
      
      if (response.ok && result.success) {
        alert('Customer mapped successfully!');
        window.location.reload();
      } else {
        alert(result.message || `Mapping failed (HTTP ${response.status})`);
      }
    } catch (error) {
      console.error('Mapping error:', error);
      alert(`Error: ${error.message}`);
    }
  });
});
</script>
{% endblock %}
