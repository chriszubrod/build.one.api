{% extends 'shared/layout/base.html' %}

{% block title %}Create Project{% endblock %}

{% block content %}
<div class="flex-1 p-4 flex flex-col">
  <div class="space-y-2 flex-1">
    <div class="flex justify-between items-center">
      <h1 class="px-3 py-2">Create Project</h1>
      <a href="{{ url_for('web_project.list_projects_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">Back to Projects</a>
    </div>

    <form id="create-project-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">
      <div class="grid grid-cols-2 gap-4 bg-white border border-gray-200 p-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 px-1 py-1">Name</label>
          <input type="text" id="name" name="name" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>

        <div>
          <label for="abbreviation" class="block text-sm font-medium text-gray-700 px-1 py-1">Abbreviation</label>
          <input type="text" id="abbreviation" name="abbreviation" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400" required>
        </div>

        <div>
          <label for="status" class="block text-sm font-medium text-gray-700 px-1 py-1">Status</label>
          <select id="status" name="status" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
            <option value="P">Planning</option>
            <option value="D">Design</option>
            <option value="B">Build</option>
            <option value="C">Complete</option>
          </select>
        </div>

        <div>
          <label for="customerGuid" class="block text-sm font-medium text-gray-700 px-1 py-1">Customer</label>
          <select id="customerGuid" name="customerGuid" class="block w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
            <option value="">Select a customer</option>
            {% for c in customers %}
              <option value="{{ c.guid }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mt-2 mb-2 px-4 py-2">
        <button type="submit" class="px-4 py-2 bg-black text-white rounded hover:bg-gray-800">Create</button>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('create-project-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const abbreviation = document.getElementById('abbreviation').value.trim();
    const status = document.getElementById('status').value;
    const customerGuid = document.getElementById('customerGuid').value;
    
    console.log('Form data:', { name, abbreviation, status, customerGuid });
    
    if (!name || !abbreviation || !status || !customerGuid) { 
      alert('Please complete all fields.'); 
      return; 
    }
    
    try {
      // Get CSRF token
      const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      
      const resp = await fetch('{{ url_for("api_project.api_post_project_route") }}', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ name, abbreviation, status, customerGuid })
      });
      
      const result = await resp.json();
      console.log('Response:', result);
      
      if (!resp.ok) { 
        throw new Error(`HTTP ${resp.status}: ${result.message || 'Unknown error'}`); 
      }
      
      if (result.success) { 
        window.location.href = '{{ url_for("web_project.list_projects_route") }}'; 
      } else { 
        alert(result.message || 'Creation failed'); 
      }
    } catch (err) { 
      console.error(err); 
      alert(`Error: ${err.message}`); 
    }
  });
});
</script>
{% endblock %}
