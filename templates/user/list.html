{% extends 'shared/components/body.html' %}

{% block title %}Users{% endblock %}

{% block content %}

    <div class="list-header">
        <h1>Users</h1>
        <div class="list-actions">
            <a href="{{ url_for('user_web.create_user_route') }}" class="btn btn-primary">
                <i class="fas fa-plus"></i>
                New User
            </a>
        </div>
    </div>

    <div class="list-grid">
        {% for user in users %}
            <a href="{{ url_for('user_web.view_user_route', user_guid=user.guid) }}" class="list-card">
                <div class="list-card-header">
                    <h3 class="item-name">{{ user.username }}</h3>
                </div>
                <div class="list-card-body">
                    <div class="item-info">
                        <div class="info-item">
                            <label>ID</label>
                            <span>{{ user.guid[:8] }}</span>
                        </div>
                    </div>
                </div>
                <!-- <div class="list-card-footer"> -->
                <!--     <span><i class="fas fa-calendar-alt"></i> Created {{ user.created_datetime }}</span> -->
                <!-- </div> -->
            </a>
        {% else %}
            <div class="list-empty-state">
                <i class="fas fa-list"></i>
                <h3>No Users Yet</h3>
                <p>Create your first user to get started</p>
                <a href="{{ url_for('user_web.create_user_route') }}" class="btn btn-primary">Create New</a>
            </div>
        {% endfor %}
    </div>

{% endblock %}
