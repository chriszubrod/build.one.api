<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="relative z-10 max-w-3xl mx-auto mt-12 p-6 pb-12 bg-white rounded-xl shadow-lg flex flex-col gap-6" id="form-container">
        <div class="absolute right-8 top-8">
            <button onclick="window.location.href='/users'" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 shadow-md">
                Back to User List
            </button>
        </div>
        <h1 class="text-2xl font-bold mb-4">Edit User</h1>
        {% if user %}
        <form id="user-edit-form" class="space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block font-semibold mb-1">GUID</label>
                    <input value="{{ user.guid }}" class="border p-2 rounded w-full bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block font-semibold mb-1">Created</label>
                    <input value="{{ user.created_datetime }}" class="border p-2 rounded w-full bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block font-semibold mb-1">Modified</label>
                    <input value="{{ user.modified_datetime }}" class="border p-2 rounded w-full bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block font-semibold mb-1">Username</label>
                    <input name="username" value="{{ user.username }}" class="border p-2 rounded w-full" required>
                </div>
            </div>
            <button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">Update User</button>
        </form>
        {% else %}
        <div class="text-red-600 font-semibold">User not found.</div>
        {% endif %}
    </div>
    <script>
        const form = document.getElementById('user-edit-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                const jsonData = {
                    guid: "{{ user.guid }}",
                    username: formData.get('username')
                };
                try {
                    const response = await fetch('/api/patch/user', {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(jsonData)
                    });
                    const result = await response.json();
                    if (response.ok && result.success) {
                        alert('User updated successfully!');
                        window.location.href = '/users';
                    } else {
                        alert('Error: ' + (result.message || 'Unknown error'));
                    }
                } catch (error) {
                    alert('Error updating user: ' + error.message);
                }
            });
        }
    </script>
</body>
</html>
