{% extends 'shared/layout/base.html' %}

{% block content %}

    <h1>Edit Entry Type</h1>

    <span>{{ entry_type.guid }}</span>

    <form id="entryTypeForm" autocomplete="off" onsubmit="return false;">

        {% include 'entry_type/_form.html' %}

        <button type="submitButton" id="submitButton" >Submit</button>

    </form>

{% endblock %}

<script src="{{ url_for('static', filename='js/form-handler.js') }}" defer></script>

<script defer>
    document.addEventListener('DOMContentLoaded', function() {
        FormHandler.init('entryTypeForm', '/api/put/entry-type', 'PUT');
    });
</script>
