<div class="flex flex-col space-y-2">
    {% if ms_drives %}
        {% for drive in ms_drives %}
            <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
                <!-- Drive Name -->
                <p class="text-sm text-gray-500">
                    Drive: 
                    <a href="#" 
                        onclick="loadDriveItems('{{ drive.drive_id }}', '{{ drive.name }}'); return false;"
                        class="text-blue-600 hover:text-blue-800">
                        {{ drive.name }}
                    </a>
                </p>
                <!-- Drive Type -->
                <p class="text-sm text-gray-500">
                    {{ drive.drive_type }}
                </p>

                <button onclick="selectItem({
                    type: 'drive',
                    drive_id: '{{ drive.drive_id }}',
                    item_id: null,
                    name: '{{ drive.name }}'
                }); return false;"
                class="mt-2 text-sm text-green-600 hover:text-green-800">
                    Select Drive
                </button>

            </div>
        {% endfor %}
    {% else %}
        <p class="text-gray-600">No drives found.</p>
    {% endif %}
</div>
