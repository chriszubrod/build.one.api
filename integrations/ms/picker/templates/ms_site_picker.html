<div class="space-y-2">
    {% if ms_sites %}
        {% for site in ms_sites %}
            <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
                <div class="flex items-center">
                    <p class="text-sm text-gray-500">
                        Site: 
                        <a href="{{ url_for('web_ms_picker.drive_picker_route', site_id=site.site_id) }}" 
                        class="text-blue-600 hover:text-blue-800">
                            {{ site.display_name }}
                        </a>
                    </p>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p class="text-gray-600">No sites found.</p>
    {% endif %}
</div>
