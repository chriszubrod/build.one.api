{% extends 'shared/layout/base.html' %}

{% block title %}Certificate of Insurance{% endblock %}

{% block content %}

    <div class="flex-1 p-4 flex flex-col">

        <div class="space-y-2 flex-1">

            <div class="flex justify-between items-center">

                <h1 class="px-3 py-2">
                    Create Certificate of Insurance
                </h1>

                <a href="{{ url_for('web_certificate_of_insurance.list_certificate_of_insurances_route') }}" class="text-blue-600 px-3 py-2 hover:text-blue-800 text-sm">
                    Back to Certificates
                </a>

            </div>

            <form id="create-coi-form" class="w-full max-h-[calc(100vh-200px)] overflow-y-auto overflow-x-hidden flex-1" autocomplete="off">

                <div class="grid grid-cols-2 gap-4">

                    <div>
                        <label for="vendor" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Vendor
                        </label>
                        <select id="vendor" name="vendor" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
                            <option value="">Select Vendor</option>
                            {% if vendors %}
                                {% for vendor in vendors %}
                                    <option value="{{ vendor.guid }}">{{ vendor.name }}</option>
                                {% endfor %}
                            {% else %}
                                <option disabled>Vendors did not populate.</option>
                            {% endif %}
                        </select>
                    </div>

                    <div>
                        <label for="type-of-insurance" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Type Of Insurance
                        </label>
                        <select id="type-of-insurance" name="type-of-insurance" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900">
                            <option value="">Select Type</option>
                            {% if type_of_insurances %}
                                {% for toi in type_of_insurances %}
                                    <option value="{{ toi.guid }}">{{ toi.name }}</option>
                                {% endfor %}
                            {% else %}
                                <option disabled>Types did not populate.</option>
                            {% endif %}
                        </select>
                    </div>

                    <div>
                        <label for="policy-number" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Policy Number
                        </label>
                        <input type="text" id="policy-number" name="policy-number" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="policy-eff-date" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Policy Effective Date
                        </label>
                        <input type="date" id="policy-eff-date" name="policy-eff-date" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="policy-exp-date" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Policy Expiration Date
                        </label>
                        <input type="date" id="policy-exp-date" name="policy-exp-date" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                    <div>
                        <label for="attachment" class="block text-sm font-medium text-gray-700 px-3 py-2">
                            Attachment
                        </label>
                        <input type="number" id="attachment" name="attachment" class="block font-medium w-full rounded-md border-2 border-gray-300 bg-white shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500 focus:outline-none px-3 py-2 text-gray-900 placeholder-gray-400">
                    </div>

                </div>

                <div class="flex items-center justify-between border-b border-gray-100 py-2">

                    <button type="submit" class="mt-2 mb-2 px-4 py-2 bg-black text-white rounded hover:bg-gray-800">
                        Submit
                    </button>

                </div>

            </form>

        </div>

    </div>

{% endblock %}

{% block extra_css %}
<style>
    #create-coi-form::-webkit-scrollbar { display: none; }
    #create-coi-form { scrollbar-width: none; -ms-overflow-style: none; }
    .overflow-y-auto::-webkit-scrollbar { display: none; }
    .overflow-y-auto { scrollbar-width: none; -ms-overflow-style: none; }
</style>
{% endblock %}

{% block page_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('create-coi-form');
    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const vendorGuid = document.getElementById('vendor').value;
        const typeOfInsuranceGuid = document.getElementById('type-of-insurance').value;
        const policyNumber = document.getElementById('policy-number').value.trim();
        const policyEffDate = document.getElementById('policy-eff-date').value;
        const policyExpDate = document.getElementById('policy-exp-date').value;
        const attachmentGuid = document.getElementById('attachment').value;

        if (!vendor || !typeOfInsurance || !policyNumber || !policyEffDate || !policyExpDate || !attachment) {
            alert('Please complete all fields.');
            return;
        }

        const payload = {
            vendor_guid: parseInt(vendorGuid),
            type_of_insurance_guid: parseInt(typeOfInsuranceGuid),
            policy_number: policyNumber,
            policy_eff_date: policyEffDate,
            policy_exp_date: policyExpDate,
            certificate_of_insurance_attachment_guid: parseInt(attachmentGuid)
        };

        try {
            const resp = await fetch('{{ url_for("api_certificate_of_insurance.api_post_certificate_of_insurance_route") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`HTTP ${resp.status}: ${text}`);
            }
            const result = await resp.json();
            if (result.success) {
                alert('Certificate created successfully.');
                window.location.href = '{{ url_for("web_certificate_of_insurance.list_certificate_of_insurances_route") }}';
            } else {
                alert(result.message || 'Create failed');
            }
        } catch (err) {
            console.error(err);
            alert(`Error: ${err.message}`);
        }
    });
});
</script>
{% endblock %}
