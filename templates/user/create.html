<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User - Build.One</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
        }
        .btn-cancel {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-user-plus me-2"></i>Create User
                    </h1>
                    <a href="/user/list" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back to List
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col form-container">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="fas fa-id-card me-2"></i>User Details
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="createUserForm">
                                <div class="mb-3">
                                    <label for="firstname" class="form-label">
                                        Firstname <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="firstname"
                                           name="firstname"
                                           required
                                           maxlength="50"
                                           placeholder="Enter firstname">
                                    <div class="form-text">Required field. Maximum 50 characters.</div>
                                </div>

                                <div class="mb-3">
                                    <label for="lastname" class="form-label">
                                        Lastname
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           id="lastname"
                                           name="lastname"
                                           maxlength="255"
                                           placeholder="Enter lastname">
                                    <div class="form-text">Optional. Maximum 255 characters.</div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <a href="/user/list" class="btn btn-secondary btn-cancel">
                                        <i class="fas fa-times me-1"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-1"></i>Create User
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('createUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const payload = {
                firstname: formData.get('firstname'),
                lastname: formData.get('lastname')
            };

            console.log('Local Storage:', localStorage);
            try {
                const response = await fetch('/api/v1/create/user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token.access_token')}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log('Create user result:', result);
                    try {
                        const update_resp = await fetch(`/api/v1/update/auth/${localStorage.getItem('auth.public_id')}/user-public-id/${result.public_id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token.access_token')}`
                            }
                        });
                        if (update_resp.ok) {
                            const update_result = await update_resp.json();
                            console.log('Auth update resposne:', update_result);
                            window.location.href = '/dashboard'; // maybe update this at another time with a user flow.
                        }
                    } catch (error) {
                        console.log('Error updating auth:', error);
                    }
                } else {
                    const error = await response.json();
                    alert('Error creating user: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating user: ' + error.message);
            }
        });
    </script>
</body>
</html>
