{% if ms_sites %}
    {% for site in ms_sites %}
        <div class="border rounded-lg p-4 mb-4">
            <h2 class="text-xl font-bold mb-2">
                {{ site.display_name }}
            </h2>
            <p class="text-gray-600">{{ site.description }}</p>
            <p class="text-sm text-gray-500">
                <a href="{{ url_for('api_ms_drives.get_site_drives', site_id=site.site_id) }}" 
                   class="text-blue-600 hover:text-blue-800">
                    Site ID: {{ site.site_id }}
                </a>
            </p>
            <p class="text-sm text-gray-500">Last Modified: {{ site.last_modified_datetime }}</p>
        </div>
    {% endfor %}
{% else %}
    <p class="text-gray-600">No sites found.</p>
{% endif %}
