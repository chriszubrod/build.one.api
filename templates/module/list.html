{% extends 'shared/layout/base.html' %}

{% block content %}

    {% for module in modules %}

        <div>
            <div>
                <span>{{ module.guid }}</span>
                <span>{{ module.name }}</span>
                <span>{{ module.description }}</span>
                <span>{{ module.slug }}</span>
            </div>
        </div>

    {% endfor %}

{% endblock %}
