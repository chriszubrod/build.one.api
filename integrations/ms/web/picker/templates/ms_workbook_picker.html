<div class="space-y-2">
    {% if ms_workbooks %}
        {% for workbook in ms_workbooks %}
            <div class="border rounded-lg p-2 hover:bg-gray-50 transition-colors duration-200">
                <div class="flex items-center">
                    <p class="text-sm text-gray-500">
                        Workbook: 
                        <a href="#" 
                           onclick="loadDrives('{{ workbook.workbook_id }}', '{{ workbook.workbook_name }}'); return false;"
                           class="text-blue-600 hover:text-blue-800">
                            {{ workbook.workbook_name }}
                        </a>
                    </p>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p class="text-gray-600">No workbooks found.</p>
    {% endif %}
</div>
