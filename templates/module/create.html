{% extends 'shared/layout/base.html' %}

{% block content %}

    <h1>Create Module</h1>

    <form id="moduleForm" autocomplete="off" onsubmit="return false;">

        {% include 'module/_form.html' %}

        <button type="submitButton" id="submitButton" >Submit</button>

    </form>

{% endblock %}

<script src="{{ url_for('static', filename='js/form-handler.js') }}" defer></script>

<script defer>
    document.addEventListener('DOMContentLoaded', function() {
        FormHandler.init('moduleForm', '/api/post/module', 'POST');
    });
</script>
